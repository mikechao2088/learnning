<body>

<div class="container">
    <h1>自然科期末模擬測驗</h1>
    <p style="text-align:center">範圍：翰林五下全 (隨機抽選 20 題)</p>
    <hr>
    <div id="quiz-container"></div>

<script>
// --- 題庫分批區域 ---
// 格式：{ q: "題目", o: ["選項1", "選項2", "選項3", "選項4"], a: 正確索引(0-3), e: "解析內容" }
const allQuestions = [
    // 範例題目 (你可以依照此格式分批貼上，補滿200題)
    { q: "下列哪一種植物的莖是屬於蔓性莖，需要攀附在其他物體上生長？", o: ["空心菜", "牽牛花", "榕樹", "大紅花"], a: 1, e: "牽牛花屬於攀緣植物，具有蔓性莖可攀附生長。" },
    { q: "在觀察聲音的傳播實驗中，將鬧鐘放入抽成真空的鐘罩內，聲音會如何變化？", o: ["變大聲", "音調變高", "聽不到聲音", "沒有變化"], a: 2, e: "聲音傳播需要介質（如空氣），真空狀態下無法傳導聲音。" },
// 第一批：各單元重點題庫 (1-40題)
    // --- 第一單元：植物的構造與功能 ---
    { q: "植物葉片上的氣孔，主要功能是什麼？", o: ["吸收陽光", "進行蒸散作用與氣體交換", "吸收水分", "支撐身體"], a: 1, e: "氣孔是植物散失水分（蒸散作用）與交換二氧化碳、氧氣的主要通道。" },
    { q: "下列哪一種植物的根屬於「軸根系」？", o: ["水稻", "玉米", "小白菜", "蔥"], a: 2, e: "雙子葉植物如小白菜通常有明顯的主根，稱為軸根系；水稻、蔥則為鬚根系。" },
    { q: "實驗證明，植物吸收的水分主要是由哪一個器官輸送到全身？", o: ["葉", "花", "莖", "果實"], a: 2, e: "植物的莖內有輸送水分的導管，負責將水分向上運輸。" },
    { q: "關於植物的光合作用，下列敘述何者錯誤？", o: ["需要陽光", "會產生氧氣", "主要在根部進行", "會製造養分"], a: 2, e: "光合作用主要在含有葉綠體的「葉片」進行，而非根部。" },
    { q: "馬鈴薯我們食用的部分，是屬於植物的哪一個器官？", o: ["塊根", "塊莖", "果實", "種子"], a: 1, e: "馬鈴薯是「塊莖」，其上有芽眼可以萌發。" },
    { q: "仙人掌的葉子演化成針狀，主要目的是什麼？", o: ["美觀", "增加光合作用", "減少水分散失", "抓取昆蟲"], a: 2, e: "針狀葉可大幅減少蒸散作用，適應沙漠乾燥環境。" },
    { q: "下列哪種植物利用「葉」來繁殖下一代？", o: ["落地生根", "甘藷", "草莓", "竹子"], a: 0, e: "落地生根的葉緣缺刻處可以長出小芽進行繁殖。" },
    { q: "植物的莖若向著有光的方向生長，這種特性稱為什麼？", o: ["向地性", "向光性", "背光性", "趨光性"], a: 1, e: "植物生長受光線影響而朝向光源的方向，稱為向光性。" },
    { q: "花粉從雄蕊傳到雌蕊柱頭上的過程稱為什麼？", o: ["受精", "授粉", "發芽", "結果"], a: 1, e: "花粉傳遞的過程稱為授粉，是結果的重要前置步驟。" },
    { q: "種子萌發時，最先長出來的通常是哪個部位？", o: ["葉", "莖", "花", "根"], a: 3, e: "種子萌發時通常先長出根，以便固定植物並吸收水分。" },

    // --- 第二單元：聲音與樂器 ---
    { q: "聲音的強弱程度，在科學上稱為什麼？", o: ["音調", "音色", "響度(音量)", "音速"], a: 2, e: "聲音的強弱稱為響度，單位通常是分貝(dB)。" },
    { q: "彈撥吉他弦時，若將弦撥得更用力，聲音會如何變化？", o: ["變高音", "變低音", "變大聲", "音色改變"], a: 2, e: "用力程度影響振動振幅，振幅越大則聲音越大（響度增加）。" },
    { q: "當物體振動頻率越快時，發出的聲音會如何？", o: ["音調越高", "音調越低", "音量越大", "音量越小"], a: 0, e: "頻率決定音調，振動越快，音調越高。" },
    { q: "下列哪一種介質中，聲音傳播的速度通常最快？", o: ["空氣", "水", "鋼鐵", "真空"], a: 2, e: "聲音在固體中傳播最快，液體次之，氣體最慢。" },
    { q: "我們可以分辨鋼琴聲和笛子聲的不同，主要是因為什麼不同？", o: ["音調", "響度", "音色", "大小"], a: 2, e: "音色是由發聲體的構造與材質決定，是分辨不同樂器的依據。" },
    { q: "製作簡易排笛時，管子越短，吹出的音調會如何？", o: ["越高", "越低", "不變", "音量越小"], a: 0, e: "空氣管越短，振動頻率越高，音調就越高。" },
    { q: "弦樂器的弦如果調得越緊，彈出的音調會偏向？", o: ["高音", "低音", "不變", "變沙啞"], a: 0, e: "弦越緊、越細、越短，振動越快，音調越高。" },
    { q: "下列關於噪音的敘述何者正確？", o: ["悅耳的音樂不可能是噪音", "長期處在噪音下會損害聽力", "只有工廠才有噪音", "分貝數越低越吵"], a: 1, e: "長期暴露在強烈噪音中會導致聽覺受損。" },
    { q: "人耳能聽到的聲音，必須具備什麼條件？", o: ["有物體振動", "有介質傳播", "在聽覺範圍內", "以上皆是"], a: 3, e: "聲音產生三要素：發聲體振動、介質、接收器（耳朵）。" },
    { q: "敲擊裝水的玻璃杯，水量越多，敲擊出的音調會如何？", o: ["越高", "越低", "不變", "無法發聲"], a: 1, e: "水量越多，整體振動質量增加，振動變慢，音調越低。" },

    // --- 第三單元：光的世界 ---
    { q: "陽光下影子的方向，通常和太陽的位置呈現什麼關係？", o: ["相同方向", "相反方向", "成90度角", "沒有固定方向"], a: 1, e: "光線被物體擋住形成影子，因此影子會出現在光源的相反側。" },
    { q: "潛望鏡是利用光的什麼特性來觀察水面上的情況？", o: ["折射", "反射", "直進", "色散"], a: 1, e: "潛望鏡利用兩面平面鏡的反射原理成像。" },
    { q: "彩虹的形成是因為陽光經過小水滴產生了什麼現象？", o: ["反射與折射", "直線前進", "光線吸收", "遮擋現象"], a: 0, e: "陽光進入水滴先折射、再反射、最後出水滴再折射，散開成七彩光。" },
    { q: "筷子斜插入裝水的杯中，看起來像斷成兩截，這是因為？", o: ["光的反射", "光的折射", "光的直進", "眼睛幻覺"], a: 1, e: "光從水進入空氣時發生偏折，稱為折射。" },
    { q: "汽車的後照鏡通常使用什麼鏡片，以獲得更大的視角？", o: ["凹透鏡", "凹面鏡", "凸面鏡", "平面鏡"], a: 2, e: "凸面鏡具有發散光線的效果，可以擴大視野範圍。" },
    { q: "放大鏡是什麼透鏡，具有匯聚光線的功能？", o: ["凸透鏡", "凹透鏡", "平面鏡", "凸面鏡"], a: 0, e: "凸透鏡（中央厚邊緣薄）可以匯聚光線並放大影像。" },
    { q: "下列關於光線傳播的敘述，何者正確？", o: ["光會轉彎", "光在同種介質中直線傳進", "光不需要介質", "以上皆是"], a: 1, e: "光在均勻介質中是直線傳播的。" },
    { q: "用雷射筆射向平面鏡，入射角是30度，反射角是多少度？", o: ["15度", "30度", "60度", "90度"], a: 1, e: "根據反射定律，入射角等於反射角。" },
    { q: "白光透過三稜鏡後會出現七彩光，這種現象稱為什麼？", o: ["折射", "反射", "色散", "繞射"], a: 2, e: "不同顏色的光折射率不同，分開後形成色散現象。" },
    { q: "近視眼鏡通常是利用什麼透鏡來矯正？", o: ["凸透鏡", "凹透鏡", "平面鏡", "三稜鏡"], a: 1, e: "凹透鏡可以發散光線，使影像往後移到視網膜上。" },

    // --- 第四單元：環境與生活 ---
    { q: "下列哪一種行為最符合環境永續發展的概念？", o: ["多使用免洗餐具", "冷氣開到最強", "實行垃圾分類與回收", "隨意引進國外物種"], a: 2, e: "垃圾減量與資源回收能減少對環境的負擔。" },
    { q: "台灣常見的「小花蔓澤蘭」被稱為綠色癌症，它是屬於？", o: ["原生種", "外來入侵種", "特有種", "保育類"], a: 1, e: "小花蔓澤蘭是強勢的外來種，會覆蓋原生植物導致其死亡。" },
    { q: "造成全球暖化主要的溫室氣體是什麼？", o: ["氧氣", "氮氣", "二氧化碳", "氦氣"], a: 2, e: "二氧化碳會吸收地表反射的熱能，加劇溫室效應。" },
    { q: "下列哪一種能源屬於「再生能源」？", o: ["石油", "煤炭", "太陽能", "天然氣"], a: 2, e: "太陽能、風能等是可以循環利用的資源。" },
    { q: "酸雨的形成，主要是大氣中哪種物質過多導致的？", o: ["氧氣", "硫氧化物與氮氧化物", "水蒸氣", "二氧化碳"], a: 1, e: "工業與汽機車排放廢氣中的硫與氮氧化物溶解在雨水中會形成酸雨。" },
    { q: "保護地球大氣中的哪一層，可以避免紫外線直接照射傷害生物？", o: ["對流層", "臭氧層", "增溫層", "散逸層"], a: 1, e: "臭氧層能吸收陽光中大部分的紫外線。" },
    { q: "所謂的「綠建築」標章，其核心理念不包括？", o: ["節能", "減廢", "奢華裝潢", "低污染"], a: 2, e: "綠建築強調與環境共生，非追求奢華。" },
    { q: "在生態系中，能將動植物屍體分解為養分的是？", o: ["生產者", "消費者", "分解者", "掠食者"], a: 2, e: "分解者（如細菌、真菌）負責物質循環。" },
    { q: "關於台灣石虎的敘述何者正確？", o: ["數量很多", "是保育類動物", "主要住在高山上", "可以帶回家當寵物"], a: 1, e: "石虎是瀕臨絕種的保育類動物，受法律保護。" },
    { q: "下列哪種做法有助於節能減碳？", o: ["隨手關燈", "多搭乘大眾運輸", "選購在地食材", "以上皆是"], a: 3, e: "這些行為都能有效減少能源消耗與碳足跡。" },
// 第二批：第一單元【植物的構造與功能】進階題庫 (41-80題)
    { q: "進行「葉片蒸散作用」實驗時，在量筒的水面上滴入一層油的主要目的是什麼？", o: ["提供植物養分", "防止量筒內水分自然蒸發", "讓光線容易進入", "幫助根部吸收水分"], a: 1, e: "滴油是為了隔絕空氣，確保量筒內水位的下降完全是因為植物的蒸散作用，而非自然蒸發。" },
    { q: "將芹菜插入紅墨水中觀察輸送水分，一段時間後將莖橫切，會看到什麼現象？", o: ["整個切面都變紅了", "只有中心部分變紅", "散布在其中的小紅點變紅", "只有外皮變紅"], a: 2, e: "紅點代表維管束（導管）的位置，負責運輸水分。" },
    { q: "觀察芹菜水分運輸實驗，若將莖「縱切」，會觀察到什麼？", o: ["一條條紅色的細線", "一個個紅色的圓點", "紅色的圓環", "完全沒有紅色"], a: 0, e: "縱切可以看到長條狀的運輸管道（維管束）。" },
    { q: "下列哪一種器官不是由「葉」演化而來的？", o: ["仙人掌的針", "食蟲植物的捕蟲囊", "落地生根的小芽", "甘藷的塊根"], a: 3, e: "甘藷的塊根是由「根」演化而來，用來儲存養分。" },
    { q: "我們常吃的「白蘿蔔」是植物的哪一個器官？", o: ["塊莖", "軸根", "球莖", "果實"], a: 1, e: "白蘿蔔是屬於肥大的軸根（儲存根）。" },
    { q: "植物進行光合作用後，最初產生的養分主要是什麼？", o: ["蛋白質", "脂肪", "澱粉(醣類)", "維生素"], a: 2, e: "光合作用產生葡萄糖，隨後轉化為澱粉儲存。" },
    { q: "關於植物的「蒸散作用」，下列敘述何者正確？", o: ["只有白天會進行", "有助於植物吸收水分與降溫", "水分從根部排出", "完全受陽光控制"], a: 1, e: "蒸散作用能產生向上的拉力帶動水分吸收，並透過水分蒸發帶走熱量。" },
    { q: "使用夾鏈袋套住葉片觀察蒸散作用，袋內出現的小水滴是哪裡來的？", o: ["空氣中的水蒸氣液化", "從根部直接噴出來的", "葉片氣孔排出的水蒸氣遇冷凝結", "夾鏈袋漏水"], a: 2, e: "葉片透過氣孔進行蒸散，排出水蒸氣在袋內凝結成水滴。" },
    { q: "下列關於「鬚根系」植物的描述，何者正確？", o: ["有一條明顯粗大的主根", "外觀看起來像老爺爺的鬍鬚", "榕樹是代表植物", "小白菜是代表植物"], a: 1, e: "鬚根系沒有主根，由許多細小的根組成，如蔥、蒜、玉米、水稻。" },
    { q: "九重葛我們看見像花瓣的紅色部位，其實是什麼器官？", o: ["花瓣", "變態葉(苞葉)", "變態莖", "果皮"], a: 1, e: "九重葛鮮艷的部分是苞葉，真正的花很小且位在中間。" },
    
    // --- 實驗細節與易錯點 ---
    { q: "在觀察植物根部吸收水分的實驗中，哪一組是「對照組」？", o: ["有根且有葉的植物", "有根但摘除葉片的植物", "只有莖沒有根的植物", "不放植物，僅在量筒裝水加油"], a: 3, e: "對照組必須排除植物因素，以證明水位的變化是植物引起的。" },
    { q: "下列哪種植物具有「匍匐莖」，會沿著地面生長？", o: ["草莓", "牽牛花", "榕樹", "大紅花"], a: 0, e: "草莓的莖沿地表生長，稱為匍匐莖。" },

// 第三批：第二單元【聲音與樂器】進階題庫 (81-120題)

    { q: "用手摸著正在說話的喉嚨，會感覺到振動，這說明了什麼？", o: ["聲音可以在固體傳播", "發聲體正在振動", "喉嚨很痛", "音量很大"], a: 1, e: "聲音是由物體的振動所產生的，振動停止，聲音也會停止。" },

    { q: "撥動不同粗細的吉他弦，哪一條弦發出的聲音「音調」最低？", o: ["最細的弦", "最粗的弦", "按得最短的弦", "撥得最用力的弦"], a: 1, e: "越粗、越重的物體振動越慢，音調越低。" },

    { q: "想要讓吉他發出的音調變高，下列哪種做法「錯誤」？", o: ["把弦調緊一點", "換成細一點的弦", "按住弦讓振動部分變短", "撥弦用力一點"], a: 3, e: "用力撥弦只會讓音量變大，不會改變音調高低。" },

    { q: "我們能在投影幕上看到電影，是因為光在螢幕上產生了什麼現象？", o: ["折射", "反射", "直線傳播", "吸收"], a: 1, e: "光線射到投影幕後反射到我們眼中，我們才看得到畫面。" },
    { q: "關於影子的形成，下列敘述何者錯誤？", o: ["光被不透明物體擋住", "影子一定出現在光源相反側", "影子一定是黑色的", "影子的大小會隨光源距離改變"], a: 2, e: "影子雖然通常呈現暗色，但若有多個彩色光源照射，可能會出現彩色影子（如彩色影實驗）。" },

    { q: "人在平面鏡前向鏡子靠近 1公尺，鏡中的像會如何變化？", o: ["遠離 1公尺", "靠近 1公尺", "大小變兩倍", "沒有變化"], a: 1, e: "平面鏡成像中，物距等於像距，你靠近鏡子，像也會等距靠近。" },

    { q: "站在清澈的溪水邊看水裡的魚，魚的實際位置應該在哪裡？", o: ["比眼睛看到的深", "比眼睛看到的淺", "跟看到的位置一樣", "在正上方"], a: 0, e: "因為光的折射，水中的物體看起來會比實際位置更「淺」。" },

    { q: "關於凸透鏡，下列敘述何者正確？", o: ["中間薄、邊緣厚", "具有發散光線的功能", "具有匯聚光線的功能", "只能產生縮小的像"], a: 2, e: "凸透鏡中間厚邊緣薄，可以將平行光匯聚於一點（焦點）。" },
    { q: "凹透鏡在日常生活中的主要應用是什麼？", o: ["放大鏡", "老花眼鏡", "近視眼鏡", "顯微鏡"], a: 2, e: "近視眼鏡利用凹透鏡發散光線的特性，使影像能正確落在視網膜上。" },

    { q: "光線射向平面鏡，如果入射角是 45 度，那麼入射光與反射光的夾角是多少？", o: ["45度", "90度", "180度", "0度"], a: 1, e: "入射角45度，反射角也是45度，兩者相加為90度。" },
    { q: "下列何者「不是」光的折射現象？", o: ["海市蜃樓", "泳池水看起來變淺", "穿衣鏡看到自己", "透過裝水杯看後方的字變形"], a: 2, e: "鏡子看到自己是反射現象。" },
    { q: "光在下列哪種介質中傳播速度最快？", o: ["水", "玻璃", "空氣", "鑽石"], a: 2, e: "介質越稀薄（密度越小），光速通常越快，真空中最快。" },

// --- 測驗邏輯 ---
const quizContainer = document.getElementById('quiz-container');
const submitBtn = document.getElementById('submit-btn');
const resultDiv = document.getElementById('result');
let selectedQuestions = [];

function initQuiz() {
    // 隨機洗牌並抽取20題
    selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 20);
    
    selectedQuestions.forEach((item, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question-box';
        qDiv.innerHTML = `
            <p><strong>第 ${index + 1} 題：</strong>${item.q}</p>
            <ul class="options" data-qindex="${index}">
                ${item.o.map((opt, i) => `<li onclick="selectOption(${index}, ${i}, this)">${opt}</li>`).join('')}
            </ul>
            <div class="explanation" id="exp-${index}">
                <p class="ans-status"></p>
                <strong>解析：</strong>${item.e}
            </div>
        `;
        quizContainer.appendChild(qDiv);
    });
}

let userAnswers = new Array(20).fill(null);

function selectOption(qIdx, optIdx, element) {
    userAnswers[qIdx] = optIdx;
    const options = element.parentNode.querySelectorAll('li');
    options.forEach(li => li.classList.remove('selected'));
    element.classList.add('selected');
}

submitBtn.onclick = function() {
    if (userAnswers.includes(null)) {
        alert("請完成所有題目後再提交！");
        return;
    }

    let score = 0;
    selectedQuestions.forEach((item, i) => {
        const expDiv = document.getElementById(`exp-${i}`);
        const statusP = expDiv.querySelector('.ans-status');
        expDiv.style.display = 'block';
        
        if (userAnswers[i] === item.a) {
            score++;
            statusP.innerHTML = `<span class="correct">答對了！</span>`;
        } else {
            statusP.innerHTML = `<span class="wrong">答錯了，正確答案是：${item.o[item.a]}</span>`;
        }
    });

    submitBtn.disabled = true;
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = `測驗結束！總分：${score * 5} 分`;
    document.getElementById('retry-btn').style.display = 'block';
    window.scrollTo(0, 0);
};

initQuiz();
</script>
