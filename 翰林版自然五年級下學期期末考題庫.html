    // 隨機選取 20 題
    function getRandomQuestions(arr, n) {
        let shuffled = arr.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, n);
    }

    const selectedQuestions = getRandomQuestions(allQuestions, 20);
    const quizContainer = document.getElementById('quiz-content');

    function renderQuiz() {
        selectedQuestions.forEach((item, index) => {
            let html = `
                <div class="question-block" id="q-block-${index}">
                    <div class="question-title">${index + 1}. ${item.q}</div>
                    ${item.options.map((opt, i) => `
                        <label class="option">
                            <input type="radio" name="q${index}" value="${i}"> ${opt}
                        </label>
                    `).join('')}
                    <div class="explanation" id="exp-${index}">
                        <strong>正確答案：${item.options[item.ans]}</strong><br>
                        解析：${item.exp}
                    </div>
                </div>
            `;
            quizContainer.innerHTML += html;
        });
    }

    function calculateScore() {
        let score = 0;
        selectedQuestions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const expDiv = document.getElementById(`exp-${index}`);
            const qBlock = document.getElementById(`q-block-${index}`);
            
            expDiv.style.display = "block";
            
            if (selected && parseInt(selected.value) === item.ans) {
                score++;
                qBlock.classList.add('correct');
            } else {
                qBlock.classList.add('wrong');
            }
        });

        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.style.display = "block";
        scoreDisplay.innerHTML = `得分：${Math.round((score / selectedQuestions.length) * 100)} 分 (答對 ${score} / ${selectedQuestions.length})`;
        window.scrollTo(0, document.body.scrollHeight);
    }

    renderQuiz();
