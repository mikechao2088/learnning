    <style>

</head>
<body>

</div>

// 隨機抽取 20 題
let testQuestions = [];

function setupQuiz() {
    // 洗牌演算法
    const shuffled = masterDatabase.sort(() => 0.5 - Math.random());
    testQuestions = shuffled.slice(0, 20);
    
    const quizMain = document.getElementById('quiz-main');
    quizMain.innerHTML = '';

    testQuestions.forEach((item, index) => {
        const qCard = document.createElement('div');
        qCard.className = 'q-card';
        qCard.innerHTML = `
            <div class="q-text">${index + 1}. ${item.q}</div>
            <div class="options">
                ${item.a.map((opt, i) => `
                    <label class="opt-label">
                        <input type="radio" name="question${index}" value="${i}"> ${opt}
                    </label>
                `).join('')}
            </div>
            <div id="exp-${index}" class="explanation">
                <strong>解析：</strong> ${item.e}
            </div>
        `;
        quizMain.appendChild(qCard);
    });
}

function calculateScore() {
    let score = 0;
    testQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="question${index}"]:checked`);
        const expBox = document.getElementById(`exp-${index}`);
        
        expBox.style.display = 'block';
        
        if (selected && parseInt(selected.value) === item.c) {
            score++;
            expBox.classList.add('correct');
            expBox.innerHTML = "✅ 答對了！" + expBox.innerHTML;
        } else {
            expBox.classList.add('wrong');
            const correctText = item.a[item.c];
            expBox.innerHTML = `❌ 答錯了！正確答案是：<b>${correctText}</b><br>` + expBox.innerHTML;
        }
    });

    const banner = document.getElementById('result-banner');
    banner.style.display = 'block';
    banner.innerHTML = `測驗完畢！您的得分：${score * 5} 分 / 100 分`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = setupQuiz;
</script>
