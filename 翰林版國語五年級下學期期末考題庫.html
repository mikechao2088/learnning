            explanation: "這句話用來比喻不聽從有經驗者的勸導，往往很快就會遭受挫折或失敗。"
        }
        // ===== 第四批結束 =====
    ];

    let selectedQuestions = [];

    // 初始化測驗：隨機選取 20 題
    function initQuiz() {
        const shuffled = [...fullQuestionBank].sort(() => 0.5 - Math.random());
        selectedQuestions = shuffled.slice(0, 20);
        
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        selectedQuestions.forEach((q, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-block';
            qDiv.innerHTML = `
                <p><strong>第 ${index + 1} 題：</strong>${q.question}</p>
                <ul class="options">
                    ${q.options.map((opt, i) => `
                        <li><label><input type="radio" name="q${index}" value="${i}"> ${opt}</label></li>
                    `).join('')}
                </ul>
                <div id="exp-${index}" class="explanation">
                    <p class="ans-label"></p>
                    <p><strong>【解析】：</strong>${q.explanation}</p>
                </div>
            `;
            container.appendChild(qDiv);
        });
    }

    // 閱卷邏輯
    function checkAnswers() {
        let score = 0;
        selectedQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const expDiv = document.getElementById(`exp-${index}`);
            const label = expDiv.querySelector('.ans-label');
            
            expDiv.style.display = 'block';
            
            if (selected && parseInt(selected.value) === q.answer) {
                score++;
                label.innerHTML = `<span class="correct">正確 ✔</span> (答案為：${q.options[q.answer]})`;
            } else {
                label.innerHTML = `<span class="wrong">錯誤 ✘</span> (正確答案應為：${q.options[q.answer]})`;
            }
        });

        document.getElementById('result').innerText = `測驗結束！您的得分：${(score / selectedQuestions.length * 100).toFixed(0)} 分`;
        window.scrollTo(0, 0);
    }

    // 啟動測驗
    initQuiz();
</script>

</body>
</html>
