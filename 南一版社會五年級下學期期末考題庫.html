<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小五社會（南一版）期末模擬測驗</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .quiz-item { margin-bottom: 25px; padding: 15px; border: 1px solid #eee; border-radius: 8px; }
        .question { font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .options label { display: block; padding: 8px; cursor: pointer; transition: 0.2s; border-radius: 4px; }
        .options label:hover { background-color: #e1f5fe; }
        .options input { margin-right: 10px; }
        .btn-container { text-align: center; margin-top: 30px; }
        button { background: #3498db; color: white; border: none; padding: 12px 30px; font-size: 1.1em; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .explanation { display: none; margin-top: 10px; padding: 10px; background: #fff3cd; border-left: 5px solid #ffc107; font-size: 0.9em; }
        .correct { color: #27ae60; font-weight: bold; }
        .wrong { color: #e74c3c; font-weight: bold; }
        .score-display { text-align: center; font-size: 1.5em; margin-top: 20px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1>國小五年級社會（南一版）下學期期末模擬題庫</h1>
    <p style="text-align: center; color: #666;">每次隨機抽選 20 題 · 祝考試順利！</p>
    
    <div id="quiz-container">
        </div>

    <div class="btn-container">
        <button onclick="submitQuiz()">提交答案並查看解析</button>
        <button onclick="location.reload()" style="background:#95a5a6; margin-left: 10px;">重新抽題</button>
    </div>
    
    <div id="result" class="score-display"></div>
</div>

<script>
/**
 * 題庫區域：你可以在此分批貼上題目
 * 格式：{ q: "題目", options: ["選項1", "選項2", "選項3", "選項4"], a: 答案索引(0-3), exp: "解析內容" }
 */
const fullBank = [
    { q: "關於台灣日治時期的「皇民化運動」，下列哪一項敘述是正確的？", options: ["鼓勵台灣人穿和服、改日姓", "全面推行台語教育", "嚴格禁止日本神道教", "保障台灣人與日本人待遇完全平等"], a: 0, exp: "詳解：皇民化運動旨在將台灣人同化為日本臣民，手段包括推行日語、改姓名及參拜神社。" },
    { q: "清領時期後期，台灣因開放通商口岸而帶來的變遷，不包括下列何者？", options: ["外商洋行紛紛設立", "茶葉與鴉片成為主要出口品", "大稻埕因貿易興起", "開始興建第一條鐵路(劉銘傳時期)"], a: 1, exp: "詳解：清領後期主要出口品為茶葉、砂糖、樟腦；鴉片主要是進口而非出口。" },
    { q: "台灣的工業化基礎主要奠定於日治時期的哪一項政策？", options: ["南進政策", "工業台灣、農業日本", "農業台灣、工業日本", "皇民化運動"], a: 2, exp: "詳解：日治初期採取「農業台灣、工業日本」，到了後期才轉向工業化以支援戰爭需求。" },
    // --- 這裡可以繼續貼上更多的題目 ---
{ q: "日治時期，日本政府在台灣推行「專賣制度」，下列哪項物品不屬於當時的專賣品？", options: ["鴉片", "食鹽", "茶葉", "香菸"], a: 2, exp: "詳解：日治時期主要專賣品為鴉片、食鹽、樟腦、菸、酒。茶葉雖是重要出口品，但非專賣制度核心。" },
{ q: "關於「霧社事件」的敘述，下列何者正確？", options: ["發生在清領時期", "由莫那·魯道率領賽德克族反抗日本暴政", "是一場為了爭取選舉權的運動", "最終原住民獲得了全面勝利"], a: 1, exp: "詳解：1930年霧社事件是日治時期原住民最具代表性的武裝抗日行動。" },
{ q: "1920年代，林獻堂、蔣渭水等人發起「台灣議會設置請願運動」，其主要目的是？", options: ["要求台灣獨立", "要求武裝起義", "要求設立具有民意基礎的議會", "推行皇民化運動"], a: 2, exp: "詳解：這是日治時期非武裝政治運動的代表，目的是爭取政治自主權與民主。" },
{ q: "下列哪一位人物被譽為「台灣醫學之父」，並參與創立台灣民眾黨？", options: ["後藤新平", "八田與一", "蔣渭水", "劉銘傳"], a: 2, exp: "詳解：蔣渭水醫師不僅醫病也醫文化，創立了台灣文化協會與台灣民眾黨。" },
{ q: "日治時期，八田與一主持興建了哪一項重大的水利工程？", options: ["桃園大圳", "嘉南大圳", "曹公圳", "瑠公圳"], a: 1, exp: "詳解：嘉南大圳完工後使嘉南平原從荒地變成台灣的糧倉。" },
{ q: "「工業台灣、農業日本」是日本政府在什麼時期提出的政策轉向？", options: ["日治初期", "日治中後期（準備南進時期）", "清領時期", "台灣光復初期"], a: 1, exp: "詳解：為了因應戰爭需求與南進政策，日本開始在台灣發展軍事與化學工業。" },
{ q: "台灣光復初期，因社會經濟混亂、官民矛盾觸發了哪一個重大的歷史事件？", options: ["二二八事件", "美麗島事件", "中壢事件", "野百合學運"], a: 0, exp: "詳解：1947年的二二八事件對台灣往後的政治與社會發展產生深遠影響。" },
{ q: "關於台灣「戒嚴時期」的敘述，下列何者「錯誤」？", options: ["限制言論、出版與集會自由", "實施黨禁與報禁", "人民可以自由組黨與遊行", "維持了將近40年之久"], a: 2, exp: "詳解：戒嚴期間嚴格限制結社與組黨自由，直到1987年解嚴後才開放。" },
{ q: "1970年代，政府推行哪項政策帶動台灣經濟轉型，成為亞洲四小龍？", options: ["土地改革", "十大建設", "加入WTO", "南向政策"], a: 1, exp: "詳解：十大建設（如南北高速公路、中鋼、核能發電廠）為台灣重工業奠定基礎。" },
{ q: "台灣第一個成立的國家公園是？", options: ["陽明山國家公園", "墾丁國家公園", "玉山國家公園", "太魯閣國家公園"], a: 1, exp: "詳解：墾丁國家公園於1984年正式掛牌執行，是台灣首座國家公園。" },
{ q: "下列哪一個組織負責推動台灣與中國大陸之間的民間經貿事務交流？", options: ["海基會", "海協會", "陸委會", "外交部"], a: 0, exp: "詳解：台灣端為海基會(海峽交流基金會)，大陸端為海協會。" },
{ q: "關於「WTO(世界貿易組織)」的敘述，下列何者正確？", options: ["台灣尚未加入", "加入後會增加農產品出口壓力，但利於工業貿易", "僅限於亞洲國家參加", "目的是為了增加各國關稅"], a: 1, exp: "詳解：加入WTO後，各國降低關稅，台灣農產品面臨低價進口競爭壓力。" },
{ q: "下列哪一種能源屬於「再生能源」，是目前台灣積極推動的綠能？", options: ["核能", "火力發電", "風力發電", "天然氣"], a: 2, exp: "詳解：風力、太陽能、水力均屬再生能源，排碳量低。" },
{ q: "台灣目前面臨的高齡化社會問題，主要是指？", options: ["出生率過高", "65歲以上人口比例持續增加", "年輕人失業率高", "移入人口過多"], a: 1, exp: "詳解：醫療進步與少子化導致老年人口比例上升，稱為高齡化社會。" },
{ q: "1990年代台灣發起的「野百合學運」，主要訴求是？", options: ["反對日本統治", "要求國會全面改選、政治民主化", "爭取週休二日", "抗議油價上漲"], a: 1, exp: "詳解：野百合學運推動了後來廢除臨時條款與國會全面改選。" },
{ q: "「世界遺產」是由聯合國的哪一個組織負責評選？", options: ["WHO", "UNICEF", "UNESCO", "WTO"], a: 2, exp: "詳解：UNESCO（聯合國教科文組織）負責維護具有普世價值的自然與文化遺產。" },
{ q: "日治時期，台灣人若要反抗日本的不公平對待，通常會透過哪些方式？", options: ["僅能武裝抗爭", "前期武裝抗爭，後期轉向政治文化啟蒙", "完全服從沒有反抗", "請求清朝派兵"], a: 1, exp: "詳解：日治初期以武裝抗日為主，1920年代後受到國際思潮影響，轉向社會運動與政治請願。" },
{ q: "關於台灣自然環境的保護，下列做法何者正確？", options: ["在山坡地過度開發果園", "大量抽取地下水發展養殖業", "落實垃圾分類與減量", "在水源保護區興建大型工廠"], a: 2, exp: "詳解：環境永續發展需要靠減少污染與節約資源來落實。" },
{ q: "「一府二鹿三艋舺」中的「艋舺」是指現在的哪裡？", options: ["高雄", "台南", "萬華", "鹿港"], a: 2, exp: "詳解：艋舺是台北萬華的舊稱，曾是清領時期重要的貿易港口。" },
{ q: "關於台灣多元文化的敘述，下列何者正確？", options: ["應該排斥外來文化以保護本土文化", "新住民文化已成為台灣多元文化的一部分", "台灣只有漢人文化", "原住民文化已經消失"], a: 1, exp: "詳解：台灣社會包含原住民、漢人、新住民等多樣文化，應互相尊重與包容。" },
{ q: "日治時期，日本政府在台灣實施「保甲制度」，其主要功能是什麼？", options: ["推廣精緻農業", "協助維持地方治安與控制人民", "辦理免費的西式教育", "推動海外貿易"], a: 1, exp: "詳解：保甲制度是日本政府利用連坐處罰來控制台灣社會、維持治安的基層組織。" },
{ q: "日治時期，台灣人所讀的「公學校」與日本人讀的「小學校」相比，存在什麼樣的現象？", options: ["教育資源與課程完全平等", "公學校的設備與升學率普遍較差", "公學校不准學習日語", "小學校只教台灣文化"], a: 1, exp: "詳ec：當時的教育體制存在嚴重的民族不平等，日本人的小學校資源遠優於台灣人的公學校。" },
{ q: "日治時期，由台灣人創辦的第一所爭取「台灣人教育權」的中學是哪一所？", options: ["台北建國中學", "台南一中", "台中中學（今台中一中）", "高雄中學"], a: 2, exp: "詳解：台中中學是由林獻堂等人募款籌建，目的是打破日本人對中等教育的壟斷。" },
{ q: "關於日治時期台灣「守時」觀念的養成，下列敘述何者正確？", options: ["引進「星期」與「標準時間」制度", "傳統農業社會原本就非常精準", "完全沒有影響", "由劉銘傳在清領時期就已全面普及"], a: 0, exp: "詳解：日本政府透過學校、工廠與公共時鐘，積極培養台灣人民「星期制」與看時鐘的守時習慣。" },
{ q: "日治時期，台灣民間公共衛生大為改善，下列哪一項「不是」當時的措施？", options: ["興建自來水與下水道系統", "推行強制接種疫苗", "全面普及全民健康保險", "處罰隨地吐痰與亂丟垃圾"], a: 2, exp: "詳解：全民健康保險是台灣光復後（1995年）才實施的政策，並非日治時期產物。" },
{ q: "日治時期著名的台灣藝術家「黃土水」，在以下哪一個領域獲得國際肯定，作品還入選日本「帝展」？", options: ["雕刻", "水彩畫", "流行音樂", "現代舞蹈"], a: 0, exp: "詳解：黃土水是台灣第一位西洋雕刻家，其作品如《甘露水》、《水牛群像》極具代表性。" },
{ q: "台灣光復初期，政府為了減輕農民負擔、促進土地利用，推行了一系列土地改革，其先後順序為何？", options: ["三七五減租 → 公地放領 → 耕者有其田", "耕者有其田 → 三七五減租 → 公地放領", "公地放領 → 三七五減租 → 耕者有其田", "三七五減租 → 耕者有其田 → 公地放領"], a: 0, exp: "詳解：土地改革三步驟為：先限制地租（三七五減租），再將國家土地賣給農民（公地放領），最後徵收地主多餘土地轉賣現耕農（耕者有其田）。" },
{ q: "政府在光復初期推行「耕者有其田」政策，對台灣社會產生的最大影響是？", options: ["地主階級勢力更加擴大", "多數農民擁有自己的土地，提高生產意願", "導致台灣農業全面破產", "促使台灣立刻放棄農業發展"], a: 1, exp: "詳解：此政策使廣大自耕農成形，穩定基層農村經濟，並提供後續工業發展的資金。" },
{ q: "1950年代，台灣為了節省外匯，利用美援資金與勞動力，積極發展什麼型態的工業？", options: ["資訊晶片高科技工業", "鋼鐵、造船等重工業", "民生消費進口替代工業（如紡織、麵粉）", "軍事武器研發工業"], a: 2, exp: "詳解：1950年代為「進口替代」時期，主要生產國內所需的民生物資，減少依賴國外進口。" },
{ q: "1960年代，政府在高雄、楠梓等地設立「加工出口區」，其主要目的是？", options: ["吸引外資、拓展外銷並創造就業機會", "保護國內傳統農業", "專門進口外國奢侈品", "發展核能發電"], a: 0, exp: "詳解：加工出口區結合了免稅優惠與廉價勞動力，開創「出口擴張」時代，帶動台灣經濟起飛。" },
{ q: "台灣實施義務教育的歷史中，哪一年政府將義務教育從6年延長為9年（即納入國民中學）？", options: ["民國34年（1945年）", "民國57年（1968年）", "民國76年（1987年）", "民國103年（2014年）"], a: 1, exp: "詳解：民國57年實施「九年國民義務教育」，大幅提升了台灣整體國民的知識水準與勞動力素質。" },
{ q: "台灣在民國70年代（1980年代）成立了哪一個科學園區，成為後來台灣科技產業的搖籃？", options: ["南部科學園區", "中部科學園區", "新竹科學園區", "內湖科技園區"], a: 2, exp: "詳解：新竹科學工業園區於1980年設立，成功引導台灣從傳統代工轉型為高科技資訊產業。" },
{ q: "我國目前中央政府的組織架構中，主要分為「五院」，下列哪一個組織負責掌管「法律的制定與預算審查」？", options: ["行政院", "立法院", "司法院", "監察院"], a: 1, exp: "詳解：立法院是我國的立法機關，負責代表人民審查預算及制定、修改法律。" },
{ q: "關於我國「地方自治」的敘述，下列哪一項「錯誤」？", options: ["縣市長由當地具有投票權的公民選舉產生", "地方居民有權參與地方公共事務", "里長、鄉鎮市區長都是由中央政府直接派任的", "地方議會負責監督地方政府"], a: 2, exp: "詳解：縣轄市、鄉、鎮長及里長均為民選，僅有直轄市的「區長」及省政府（已虛級化）官員為派任。" },
{ q: "當人民認為自己的權利受到政府行政處分的不法侵害時，可以依法向政府提出什麼程序來救濟？", options: ["提起訴願與行政訴訟", "直接罷免行政首長", "向警察局申請拘留", "發動武裝抗爭"], a: 0, exp: "詳解：依據憲法保障的人民權利，若不服行政機關的決定，可先提起「訴願」，若仍不服可打「行政訴訟」。" },
{ q: "下列哪一項法律是我國的「根本大法」，任何法律若與它牴觸皆屬無效？", options: ["民法", "刑法", "中華民國憲法", "社會秩序維護法"], a: 2, exp: "詳解：憲法具有最高位階，保障人民基本權利並規範國家組織架構，是所有法律的母法。" },
{ q: "民國85年（1996年），台灣完成了一項民主發展的重要里程碑，請問是哪一項？", options: ["第一次開放地方縣市長選舉", "第一次由人民直接選舉總統", "廢除臨時條款", "宣布終止戒嚴"], a: 1, exp: "詳解：1996年李登輝當選為我國歷史上第一位民選總統，落實主權在民。" },
{ q: "關於我國公民的「選舉權」，必須符合法律規定的年齡限制。目前在台灣，幾歲以上的公民才享有憲法保障的「選舉權」？", options: ["18歲", "20歲", "23歲", "25歲"], a: 1, exp: "詳解：依據我國憲法現行規定，年滿20歲之公民享有選舉權（注意：公民投票法已降至18歲，但憲法選舉權仍為20歲）。" },
{ q: "為維護社會公平與照顧弱勢，政府推行了許多社會福利政策，下列哪一項「不屬於」社會福利措施？", options: ["發放低收入戶生活補助", "實施勞工保險與國民年金", "全面降低高收入者的所得稅率", "提供身心障礙者就業輔導"], a: 2, exp: "詳解：降低富人稅率並非社會福利，社會福利旨在縮短貧富差距、保障弱勢基本生活。" },
{ q: "台灣的民間信仰非常多元，每逢農曆三月，常可見到大規模的「媽祖繞境」活動。這項活動最初是由哪一個時期的移民渡海帶入台灣的？", options: ["日治時期", "清領時期（或更早的閩粵移民）", "民國三十八年政府遷台後", "新住民移入時期"], a: 1, exp: "詳解：媽祖是閩南地區的重要信仰，隨著清領時期大批沿海移民「航海過台灣」而傳入，成為台灣普遍的守護神。" },
{ q: "隨著社會變遷，台灣的家庭型態愈來愈多元。請問由「父母與未婚子女」組成的家庭，在社會學上通常稱為什麼？", options: ["核心家庭", "大家庭", "折衷家庭", "單親家庭"], a: 0, exp: "詳解：核心家庭又稱兩代家庭，由夫妻二人或父母與未婚子女組成，是現代台灣最普遍的家庭型態。" },
{ q: "關於「折衷家庭」（三代同堂）的敘述，下列何者正確？", options: ["是由祖父母、父母與未婚子女組成的家庭", "家庭成員只有夫妻兩人", "完全沒有任何照顧老人的功能", "在現代都市中比例已經超越核心家庭"], a: 0, exp: "詳解：折衷家庭包含三代成員，能同時兼顧奉養老人與照顧幼童，但在現代社會比例已逐漸減少。" },
{ q: "近年來，台灣許多學校與社區開始舉辦「東南亞文化日」，介紹娘惹糕、潑水節等。這反映了台灣社會對哪一個群體文化的重視？", options: ["原住民族", "新住民與移工", "荷蘭統治時期遺留者", "早期閩粵移民"], a: 1, exp: "詳解：隨著跨國婚姻與經濟交流，東南亞新住民與移工為台灣注入了豐富的多元文化。" },
{ q: "面對台灣日益嚴重的「少子化」現象，下列哪一項「不是」可能帶來的社會影響？", options: ["未來勞動力人口不足", "學校面臨減班或停辦", "政府的健保與養老負擔減輕", "衝擊未來的經濟發展"], a: 2, exp: "詳解：少子化會使未來工作人口減少，但因為高齡人口增加，政府的健保與養老負擔反而會加重。" },
{ q: "為了營造對新住民友善的環境，政府與民間團體做了許多努力。下列哪一項做法「不恰當」？", options: ["開設新住民台語或中文學習班", "電視台開設印尼語、越南語新聞播報", "要求新住民必須完全放棄原本國家的文化與習俗", "舉辦多元文化園遊會增進國民理解"], a: 2, exp: "詳解：尊重多元文化應包容與欣賞其原本的文化，不應強迫其完全放棄原生文化。" },
{ q: "當台灣的醫療技術進步、國民壽命延長，且65歲以上人口占總人口比例超過14%時，台灣社會已進入了什麼階段？", options: ["高齡社會", "超高齡社會", "高齡化社會", "幼年社會"], a: 0, exp: "詳解：世界衛生組織定義，65歲以上人口達7%為高齡化社會，達14%為「高齡社會」，達20%則為「超高齡社會」。" },
{ q: "台灣雖然不是聯合國的會員國，但仍積極參與各項非政府組織（NGO）的國際人道救援。下列哪一個組織「不屬於」政府機關，而是著名的民間國際救援組織？", options: ["外交部", "世界展望會（World Vision）", "衛生福利部", "農業委員會"], a: 1, exp: "詳解：世界展望會、台灣路竹會、慈濟基金會等，皆為台灣著名的民間非政府組織（NGO），積極參與國際援助。" },
{ q: "「地球村」的概念主要是形容現代世界因為什麼因素的快速發展，使得各國之間的距離與隔閡大大縮小？", options: ["農業技術與耕作工具", "交通運輸與資訊科技", "各國貨幣的統一", "世界人口的減少"], a: 1, exp: "詳解：飛機、高鐵等交通工具以及網際網路、智慧型手機的普及，讓全球資訊與人員流動變得極為快速，如同住在同一個村子裡。" },
{ q: "當世界某個地方發生嚴重的傳染病（如減緩後的COVID-19變異株或流感），很快就會蔓延到其他國家。這最能說明地球村的什麼特性？", options: ["各國文化完全相同", "全球牽一髮而動全身的「緊密相連性」", "傳染病只會在落後國家傳播", "國際貿易會因此完全中斷"], a: 1, exp: "詳解：地球村時代人員往來頻繁，一國的衛生、經濟或環境問題很容易引發全球性的連鎖反應。" },
{ q: "台灣的電子晶片（半導體）產業在全球供應鏈中占有舉足輕重的地位，許多國際大廠都依賴台灣的代工。這體現了台灣在國際上的哪一種優勢？", options: ["天然資源豐富", "土地面積廣大", "高科技研發與精準製造能力", "廉價的勞動力"], a: 2, exp: "詳解：台灣憑藉科學園區的發展與高素質的科技人才，在全球高科技供應鏈中成為不可或缺的核心。" },
{ q: "關於全球化對我們日常生活的影響，下列哪一個例子「不屬於」全球化的現象？", options: ["在台灣可以吃到美國的麥當勞和日本的壽司", "透過網路直播可以即時觀看歐洲足球賽", "台灣阿嬤堅持用傳統大灶燒柴煮熱水", "使用韓國品牌的手機與觀看好萊塢電影"], a: 2, exp: "詳解：使用傳統大灶燒柴屬於在地傳統生活方式，其餘三者皆為跨國科技、文化與商品流動的全球化現象。" },
{ q: "近年來台灣積極推動「垃圾分類」與「資源回收」，並實施「垃圾不落地」政策，這在國際上獲得極高的評價。這項政策主要有助於解決什麼問題？", options: ["少子化問題", "環境污染與資源浪費", "經濟成長太慢", "國際地位低落"], a: 1, exp: "詳解：垃圾減量與資源循環利用，是落實環境保護與綠色永續生活的重要關鍵。" },
{ q: "在國際貿易中，台灣需要向國外購買石油、天然氣等能源，這在貿易上稱為什麼？", options: ["進口", "出口", "出境", "走私"], a: 0, exp: "詳解：向國外購買商品或原料運進國內，稱為「進口」；將國內商品賣到國外，則稱為「出口」。" },
{ q: "台灣的「世界宗教博物館」或是各地的文化交流展覽，主要在傳遞什麼樣的核心價值？", options: ["單一文化至上", "排斥非本土信仰", "尊重、包容與多元文化共榮", "全球文化應該完全統一"], a: 2, exp: "詳解：面對全球化與多元社會，學習欣賞不同國家的宗教、習俗與文化，才能減少衝突，和諧共處。" },
{ q: "下列哪一項行為，屬於現代小學生在生活中就能實踐的「世界公民」好表現？", options: ["拒絕與班上的新住民二代同學說話", "隨手關燈節約能源，減緩全球暖化", "認為外國的事都跟台灣沒有關係", "大量購買外國進口零食並浪費食物"], a: 1, exp: "詳解：全球暖化是全人類面臨的課題，在日常生活中節能減碳，就是盡到世界公民的責任。" },
{ q: "當跨國企業將工廠設在工資較低的國家，而將研發中心設在科技發達的國家，這種現象稱為什麼？", options: ["國際分工", "地方自治", "關稅壁壘", "區域衝突"], a: 0, exp: "詳解：國際分工是指各國發揮自身優勢（如廉價勞力、高科技、豐富資源），共同合作完成商品的生產。" },
{ q: "黑面琵鷺每年冬天都會從北方飛到台灣的曾文溪口過冬，這吸引了許多國際保育人士的關注。保護這些候鳥的棲息地，屬於什麼層面的工作？", options: ["僅屬於台南地方政府的雜事", "跨國界的生態與自然環境保育", "為了增加台灣的捕魚量", "推廣台灣的重工業發展"], a: 1, exp: "詳解：野生動物保育無國界，保護珍貴的濕地與候鳥，是台灣對全球生態保育的重要貢獻。" },
{ q: "關於台灣社會推動「性別平等」的進程，下列哪一項敘述「錯誤」？", options: ["法律保障男女享有平等的財產繼承權", "職場上實施性別工作平等法，保障育嬰假", "現代社會普遍認為家務事應該全部由女性承擔", "學校教育推動性別平等，打破傳統刻板印象"], a: 2, exp: "詳解：現代性別平等觀念強調家務與育兒應由家庭成員共同分擔，不再是女性的單一責任。" },
{ q: "現代社會資訊發達，網路上常有許多未經證實的「假新聞」或謠言。身為聰明的網頁使用者與世界公民，我們應該怎麼做？", options: ["看到好玩的就立刻轉發給所有親友", "保持客觀態度，先進行查證而不盲目相信", "只要是網路上寫的，就一定全盤接受", "跟著網友一起在留言區謾罵"], a: 1, exp: "詳解：具備「媒體識讀」能力，學會查證網路訊息的正誤，是現代公民必備的素養。" },
{ q: "台灣的民間美食「珍珠奶茶」成功行銷到美國、日本、歐洲等地，引起排隊熱潮。這屬於哪一種形式的全球化？", options: ["政治制度的全球化", "飲食文化的全球化與輸出", "科技產業的壟斷", "勞動力的跨國剝削"], a: 1, exp: "詳解：台灣在地美食走向國際並融入當地生活，是文化交流與全球化擴散的經典案例。" },
{ q: "近年來全球氣候變遷加劇，北極冰層融化導致海平面上升。這種現象主要與空氣中哪一種氣體過多所造成的「溫室效應」有關？", options: ["氧氣", "二氧化碳", "氮氣", "氦氣"], a: 1, exp: "詳解：人類大量燃燒化石燃料排放過多二氧化碳，加劇溫室效應，導致全球暖化與氣候變遷。" },
{ q: "臺灣的墾丁海域曾因為全球海水變暖，導致大量珊瑚出現什麼現象，面臨嚴重的生態危機？", options: ["珊瑚白化", "珊瑚過度生長", "珊瑚顏色變鮮豔", "珊瑚突變成植物"], a: 0, exp: "詳解：當海水溫度過高或受到污染時，共生藻會離開珊瑚蟲，導致珊瑚失去顏色而「白化」，長期下來會造成珊瑚死亡。" },
{ q: "為了解決地球資源枯竭與環境污染問題，聯合國提出了「SDGs」，請問這四個英文字母代表什麼意思？", options: ["世界貿易組織條約", "國際人道救援計畫", "永續發展目標", "全球科技合作聯盟"], a: 2, exp: "詳解：SDGs（Sustainable Development Goals）是指聯合國提出的17項永續發展目標，指引全球共同邁向環境與社會的永續。" },
{ q: "臺灣每年夏季常受到颱風侵襲，雖然帶來豐沛雨量，但也常在山區引發哪一種自然災害，造成道路中斷與家園破壞？", options: ["沙塵暴", "火山噴發", "土石流", "寒害"], a: 2, exp: "詳解：臺灣山坡地陡峭，當颱風帶來強降雨時，極易在過度開發或地質脆弱的山區引發土石流。" },
{ q: "關於「綠色消費」的觀念，下列哪一種消費行為「不符合」環保與永續的原則？", options: ["購買具有環保標章或節能標章的產品", "出門購物自備環保袋與環保杯", "為了方便，每餐都使用免洗餐具", "優先選擇在地生產的當季食材"], a: 2, exp: "詳解：大量使用免洗餐具會製造不必要的垃圾，增加環境負擔，不符合綠色消費精神。" },
{ q: "當我們在購買商品時，若看到包裝上印有「一隻綠色的鳥銜著一片綠葉，包圍著地球」的圖樣，這代表什麼標章？", options: ["節能標章", "環保標章", "省水標章", "碳足跡標章"], a: 1, exp: "詳解：這是我國的「環保標章」，代表該商品符合「低污染、省資源、可回收」的環保特點。" },
{ q: "隨著網路科技發達，許多人喜歡在網路上進行購物（網購）。依據我國《消費者保護法》規定，網購原則上享有幾天的「鑑賞期」，可以無條件退貨？", options: ["3天", "7天", "10天", "30天"], a: 1, exp: "詳解：網購、郵購等特種買賣，因消費者無法當場檢視商品，消保法規定享有7天的鑑賞期（猶豫期）保障。" },
{ q: "小明在網路上看到一則訊息說：「多吃某種水果可以一星期內減重10公斤，還能治百病。」此時小明應該具備什麼素養？", options: ["盲目崇拜，立刻大量購買", "運用「媒體識讀」能力，質疑並查證其真實性", "轉發給所有通訊軟體群組", "直接相信並照著做"], a: 1, exp: "詳解：現代人必須具備媒體識讀能力，對誇大不實、未經醫學證實的網路謠言保持警覺並查證。" },
{ q: "關於智慧財產權的保護，下列哪一種行為屬於「合法」且尊重創作者的表現？", options: ["從網路下載盜版電影並販售賺錢", "在寫報告時，引用他人文章並清楚註明出處", "把同學寫的小說直接簽上自己的名字發表", "影印整本教科書來省錢"], a: 1, exp: "詳解：合理引用並註明作者與出處，是尊重著作權的合法行為；其餘皆屬侵害智慧財產權的違法行為。" },
{ q: "臺灣在物種保育上做了許多努力，例如保護「櫻花鉤吻鮭」。請問這種珍貴的臺灣特有種「國寶魚」，主要棲息在下列哪一個國家公園內？", options: ["墾丁國家公園", "玉山國家公園", "雪霸國家公園", "陽明山國家公園"], a: 2, exp: "詳解：櫻花鉤吻鮭是冰河時期留下來的孑遺生物，目前主要棲息於雪霸國家公園的大甲溪上游七家灣溪。" },
{ q: "全球化讓世界各地的文化加速交流，但有時也會帶來本土文化的失傳危機。下列哪一種做法最能平衡全球化與在地文化的維護？", options: ["拒絕接受任何外國新事物", "積極記錄、傳承在地語言與傳統工藝，並結合現代創意行銷", "全面改說外語，放棄本土語言", "拆除所有歷史古蹟以興建現代化摩天大樓"], a: 1, exp: "詳解：透過「在地化」的活化與傳承，能讓傳統文化在全球化浪潮中找到新生命，展現獨特性。" },
{ q: "在現代數位社會中，個人的姓名、身分證字號、電話與住址等，受到哪一部法律的嚴格保護，以防範隱私外洩與詐騙？", options: ["個人資料保護法", "著作權法", "刑法", "民法"], a: 0, exp: "詳解：《個人資料保護法》旨在規範個人資料的蒐集、處理及利用，保護人民的隱私權與資訊安全。" },
{ q: "當我們在網路上與他人互動時，雖然不用面對面，但仍必須遵守哪一種規範，不隨意辱罵、恐嚇他人？", options: ["只有班規有用", "完全不需要規範，可以隨便發言", "網路禮儀與相關法律（如公然侮辱罪）", "只要不被發現就沒關係"], a: 2, exp: "詳解：網路世界並非法外之地，匿名的惡意言論同樣可能觸犯法律（如刑法公然侮辱或誹謗罪），應保持良好的網路民意與禮儀。" },
{ q: "下列哪一個行政機關，主要掌管我國全國的學校教育、體育發展及文化事務？", options: ["內政部", "經濟部", "教育部", "法務部"], a: 2, exp: "詳解：教育部為我國中央政府組織之一，專門負責全國的教育與學術體育相關政策。" },
{ q: "黑面琵鷺因為數量稀少，被列為瀕危物種。牠們每年秋末會從北方飛到臺灣的哪一個地區度冬，成為臺灣著名的生態保育活招牌？", options: ["臺北陽明山", "臺南曾文溪口濕地", "南投日月潭", "屏東大鵬灣"], a: 1, exp: "詳解：臺南七股曾文溪口濕地擁有豐富的生態食物，是全球黑面琵鷺最重要的度冬棲息地之一。" },
{ q: "「網路上有人假冒銀行客服人員，打電話宣稱你的帳戶設定錯誤，要求你到ATM（自動櫃員機）操作解除設定。」這是一種常見的什麼犯罪？", options: ["暴力搶劫", "電信網路詐騙", "竊盜罪", "走私罪"], a: 1, exp: "詳解：這是利用電話或網路進行的電信詐騙犯罪。切記ATM只有轉帳與提款功能，無法解除任何設定，遇到疑慮應撥打165反詐騙專線。" },
{ q: "下列哪一項「不是」全球化帶來的好處？", options: ["可以更快速地買到世界各國的商品", "國際間的文化與學術交流更加便利", "貧富差距與跨國傳染病傳播速度可能擴大", "能即時掌握全球重大新聞事件"], a: 2, exp: "詳解：全球化雖然帶來便利，但「貧富差距擴大」與「傳染病加速傳播」是全球化帶來的**負面衝擊與挑戰**，而非好處。" },
{ q: "在現代社會中，當消費者與商家發生嚴重的消費爭議，且雙方無法達成和解時，消費者可以向各縣市政府的哪一個職位或單位尋求申訴救濟？", options: ["消費者保護官（消保官）", "警察局長", "法院法官", "稅捐稽徵處"], a: 0, exp: "詳解：各縣市政府設有消保官與消費者服務中心，專門協助處理消費爭議、保障消費者合法權益。" },
{ q: "為減緩地球暖化，個人在生活中實踐「減碳生活」，下列哪一項措施「最無助於」減少碳排放？", options: ["多搭乘公車、捷運等大眾運輸工具", "隨手關閉不使用的電器電源", "天天開冷氣並將溫度設定在16度", "多吃在地食材，減少食物里程"], a: 2, exp: "詳解：將冷氣溫度設定過低會消耗大量電力，增加火力發電廠的排碳量，不利於減碳。" },
{ q: "下列關於臺灣經濟發展的轉變順序，何者最符合歷史脈絡？", options: ["高科技半導體 → 傳統農業 → 輕工業代工", "傳統農業 → 輕工業代工 → 高科技與資訊產業", "輕工業代工 → 高科技半導體 → 傳統農業", "傳統農業 → 工業全無 → 直接進入AI時代"], a: 1, exp: "詳解：臺灣經濟經歷了早期的農業社會，到1960-70年代的輕工業與重工業（加工出口、十大建設），再到1980年代後的電子與半導體高科技產業轉型。" },
{ q: "在台灣，當立法院通過一項法律案後，必須送交給哪一個職位的人公布，這項法律才會正式生效？", options: ["行政院院長", "總統", "司法院院長", "大法官"], a: 1, exp: "詳解：依據憲法規定，法律經立法院通過後，由總統公布之，方能正式發生法律效力。" },
{ q: "為了防止政府權力過大而侵害人民權益，我國憲法將國家權力分為五權，彼此互相監督制衡。請問下列哪一組機關的監督關係是正確的？", options: ["行政院監督立法院", "立法院質詢行政院並審查其預算", "司法院審查考試院的公務員任用", "監察院負責處罰一般違規市民"], a: 1, exp: "詳解：立法院是我國的立法機關，有權聽取行政院的施政報告並提出質詢，同時審查中央政府總預算，以監督行政機關。" },
{ q: "當政府或民間企業想要興建大型工廠、高鐵或水庫時，為了評估這項工程對當地生態、居民健康可能造成的衝擊，必須依法先進行什麼程序？", options: ["經濟效益分析", "都市計畫變更", "環境影響評估（環評）", "國際招標作業"], a: 2, exp: "詳解：依據《環境影響評估法》，為了預防及減輕開發行為對環境造成不良影響，必須在開發前進行科學性的環境影響評估。" },
{ q: "小明的爸爸買了一台新車，結果開不到一個月煞車就無故失靈，導致車子撞傷。依據《消費者保護法》，車商必須承擔什麼責任？", options: ["完全沒有責任，因為已經賣出了", "產品無過失責任，必須確保商品安全性，否則應負損害賠償責任", "只要幫忙修理就好，不用賠償其他損失", "由買車的消費者自己承擔運氣不好的責任"], a: 1, exp: "詳解：《消費者保護法》規定，企業經營者對於其提供的商品或服務，應確保符合當時科技或專業水準之安全性，若造成消費者損害應負賠償責任（無過失責任原則）。" },
{ q: "「中華民國消費者文教基金會」（簡稱消基會）在台灣的消費者權益保護上扮演重要角色。關於消基會的敘述，下列何者正確？", options: ["它是政府設立的行政機關", "它是民間發起的非營利組織（NGO）", "它有權力直接對黑心商家進行罰款或勒令停業", "它專門幫商家推銷商品"], a: 1, exp: "詳解：消基會是台灣著名的民間保護消費者權益組織（屬於非政府組織 NGO），主要透過商品檢驗、消費諮詢與輿論力量來爭取消費者權益，但它沒有行政罰款的權力。" },
{ q: "隨著智慧型手機與行動支付的普及，現在出門不帶錢包也能消費。這種現象最能說明什麼轉變？", options: ["傳統貨幣完全消失不見", "數位科技融入日常生活與經濟活動", "政府不再印刷紙鈔", "大家都變富有不需要算錢"], a: 1, exp: "詳解：行動支付、網銀轉帳等是數位科技發展帶來的經濟生活型態轉變，讓消費行為更便利快速。" },
{ q: "下列哪一種行為，違反了《著作權法》對創作者「公開傳輸權」或「重製權」的保護？", options: ["在課堂上為了寫報告而引用書中的一句話，並註明出處", "把自己買的正版音樂CD檔案，上傳到公開論壇供網友免費下載", "在書店翻閱雜誌但沒有購買", "自己在家裡哼唱廣播聽到的流行歌曲"], a: 1, exp: "詳解：正版音樂僅供個人合法使用，若未經授權將其檔案上傳至公開網路供他人下載，屬於侵害創作者的著作財產權行為。" },
{ q: "在民主社會中，人民可以透過「遊行、集會」來向政府表達抗議或訴求。這項權利受到憲法保障的哪一種基本自由？", options: ["人身自由", "集會結社自由", "居住遷徙自由", "言論自由"], a: 1, exp: "詳解：憲法第十四條規定「人民有集會及結社之自由」，保障人民組織團體、共同舉行集會遊行以表達意見的權利。" },
{ q: "為了推動國際貿易，台灣加入了「亞太經濟合作會議」。請問這個組織的英文簡稱是什麼？", options: ["APEC", "WTO", "WHO", "UN"], a: 0, exp: "詳解：亞太經濟合作會議（Asia-Pacific Economic Cooperation）簡稱 APEC，是亞太地區重要的經濟合作論壇，台灣是其正式會員。" },
{ q: "黑面琵鷺、櫻花鉤吻鮭、台灣黑熊都是台灣珍貴的野生動物。為了保護這些物種免於滅絕，我國制定了哪一部法律來規範捕殺、買賣野生動物的行為？", options: ["國家公園法", "野生動物保育法", "森林法", "環境保護法"], a: 1, exp: "詳解：《野生動物保育法》旨在保育野生動物，維護生物多樣性，對瀕危及珍貴稀有野生動物設有嚴格的保護與處罰規定。" },
{ q: "當我們在網路上註冊新遊戲帳號或使用App時，畫面通常會跳出長長的「使用者服務條款與隱私權政策」。我們應該怎麼做？", options: ["直接滑到最下面按「我同意」，反正字太多不用看", "大致閱讀核心內容，特別注意個人資料會被如何蒐集與使用", "叫爸爸媽媽幫忙全部背下來", "立刻關掉網頁再也不使用網路"], a: 1, exp: "詳解：網路時代隱私安全至關重要，留意條款中關於「個人資料授權範圍」的規定，可以避免個資被惡意販售或濫用。" },
{ q: "關於台灣「少子化」對教育現場帶來的衝擊，下列敘述何者錯誤？", options: ["許多大專院校可能面臨招不到學生而退場的危機", "國中小學每班的學生人數（班級人數）普遍比以前減少", "學校的教師需求量可能會逐年減少", "少子化會讓學校的硬體設備變得越來越破舊"], a: 3, exp: "詳解：少子化會導致學生總人數減少、減班、停辦等危機，但與硬體設備是否破舊沒有直接因果關係，政府與學校反而會因為學生變少而推動精緻化教學或改善硬體。" },
{ q: "為了保障勞工權益，規定勞工最低工資、工作時間、休息日以及退休金等最低標準的台灣法律是哪一部？", options: ["勞動基準法（勞基法）", "工會法", "就業服務法", "勞工保險條例"], a: 0, exp: "詳解：《勞動基準法》是我國保障勞工勞動條件最低標準的法律，旨在維護勞工權益、促進勞資關係和諧。" },
{ q: "小五的社會課本提到「資訊科技是一把雙面刃」。下列哪一個現象屬於資訊科技帶來的「負面」影響？", options: ["可以透過遠距教學跟外國老師學英語", "網路成癮導致視力變差且人際關係疏離", "查閱資料非常方便不用跑圖書館", "隨時可以用通訊軟體跟遠方的親友視訊"], a: 1, exp: "詳解：網路雖然帶來便利，但過度沉迷、假訊息氾濫、個人隱私外洩等，都是資訊科技帶來的負面衝擊。" },
{ q: "在台灣的民主選舉中，為了確保每一位選民的投票意願不受到他人的威脅或窺探，投票時必須在祕密的圈選處進行，且不能亮票。這符合民主選舉的哪一項原則？", options: ["普通原則", "平等原則", "直接原則", "無記名原則（祕密原則）"], a: 3, exp: "詳解：無記名原則是指選票上不簽名，且投票內容保密，保障選民可以自由依照個人意志投票。" },
{ q: "台灣近年積極推動「數位政府」，例如人民可以用手機申報綜合所得稅、線上申請戶籍謄本。這項政策的主要目的是？", options: ["限制人民上網的時間", "提高政府行政效率，提供人民更便利的服務", "強迫每個人都必須買最新款的手機", "減少公務員的工作機會"], a: 1, exp: "詳解：數位政府利用資訊科技將公共服務網路化，能節省民眾臨櫃排隊的時間，大幅提升政府的服務效率。" },
{ q: "清領後期與日治時期，台灣都有大規模的鐵路興建。關於這兩個時期的鐵路發展，下列敘述何者正確？", options: ["劉銘傳興建了台灣第一條高鐵", "日治時期完成了縱貫鐵路（基隆到高雄）的通車", "清領時期鐵路就已經環繞全台灣", "日治時期的鐵路全都是為了載送旅客，沒有運送貨物"], a: 1, exp: "詳解：清領時期劉銘傳僅完成基隆到新竹段鐵路；日治時期（1908年）則完成了從基隆到高雄的縱貫鐵路，對台灣全島的經濟與交通有決定性的影響。" },
{ q: "台灣的「世界環境日」活動常宣導「減塑生活」，例如禁用塑膠吸管、購物袋付費。這些政策主要是為了解決什麼環境環境問題？", options: ["酸雨危害", "海洋塑膠垃圾與微塑膠污染", "地盤下陷", "臭氧層破洞"], a: 1, exp: "詳解：塑膠製品難以自然分解，流入海洋會造成海龜、鯨魚等生物誤食死亡，並碎裂成微塑膠進入食物鏈，減塑能從源頭保護生態。" },
{ q: "現代社會講求「法治」，關於法治精神的含義，下列敘述何者正確？", options: ["法律是用來管普通人民的，政府官員不用遵守", "政府的施政與權力行使必須嚴格遵守法律的規定（依法行政）", "只要執法者的出發點是好的，不用管法律怎麼規定", "法律應該由國王或總統一個人說了算"], a: 2, exp: "詳解：法治（Rule of Law）的核心精神是「法律面前人人平等」，不僅人民要守法，政府機關的權力行使更必須依法有據，這稱為依法行政。" },
{ q: "有些不肖業者會將工廠未經處理的廢水直接排入河川，導致魚蝦大量死亡，農田遭受重金屬污染。這種行為違反了環境保護的什麼原則？", options: ["國際分工原則", "環境永續與社會正義原則", "經濟利益優先原則", "地方自治原則"], a: 1, exp: "詳解：為了眼前的經濟私利而破壞環境，會剝奪下一代與其他生物生存的權利，嚴重違反生態永續發展。" },
{ q: "臺灣的黑熊、臺灣獼猴、櫻花鉤吻鮭等，都是在其他國家很少見的珍貴物種。這類「僅在特定地區自然分布，其他地方沒有」的生物，稱為什麼？", options: ["外來種生物", "特有種生物", "突變種生物", "馴化種生物"], a: 1, exp: "詳解：臺灣因為地理隔離、地貌複雜，演化出許多僅分布於臺灣本島的「特有種」生物，是非常珍貴的自然資產。" },
{ q: "關於近年來大眾所關注的「碳足跡」觀念，下列敘述何者正確？", options: ["指人在泥土地上踩出的腳印大小", "指一項商品從生產、運輸到廢棄，所產生的溫室氣體總量", "指工廠排放出來的黑色灰塵量", "指每個人每天走路所消耗的卡路里"], a: 1, exp: "詳解：碳足跡（Carbon Footprint）是指一項活動或產品在其生命週期中所直接與間接產生的二氧化碳排放量，碳足跡越低越環保。" },
{ q: "政府為了保護臺灣特有的自然生態、野生動物或具有特殊地質景觀的區域，依法設立了許多性質不同的區域。下列何者不屬於這類保護區？", options: ["國家公園", "野生動物保護區", "自然保留區", "加工出口區"], a: 3, exp: "詳解：加工出口區是為了發展工商業與促進外銷而設立的，其餘三者皆為以環境與生態保育為目的的法定保護區。" },
{ q: "近年來臺灣各地的「老街」和「古蹟」受到重視，並被活化為觀光景點。關於這些古蹟的維護，下列哪一種觀念才正確？", options: ["只要妨礙都市道路拓寬，就應該立刻拆除", "古蹟是重要的「歷史文化資產」，能讓我們了解先民的生活與歷史", "古蹟都很破舊，應該全部改建成現代摩天大樓", "古蹟只能原封不動藏起來，絕對不能給遊客參觀"], a: 1, exp: "詳解：歷史建築與古蹟屬於珍貴的文化資產，透過適當的修復與活化，能在保留歷史記憶的同時帶動地方文化觀光。" },
{ q: "在臺灣的家庭結構變遷中，常出現「父母因為工作關係留在都市，而將年幼的孩子留在鄉下請祖父母照顧」的現象。這種家庭型態稱為什麼？", options: ["核心家庭", "單親家庭", "隔代家庭", "新住民家庭"], a: 2, exp: "詳解：隔代家庭是指由祖父母（或外祖父母）與孫子女共同組成的家庭，中間一代的父母因故未共同生活。" },
{ q: "全球化讓臺灣的便利商店（如7-11、全家）可以在同一家店裡買到美國的牛奶、日本的零食、韓國的泡麵。這說明了全球化的什麼特點？", options: ["各國的產品種類完全一模一樣", "跨國商品貿易的普及與生活的便利性", "臺灣本地不再生產任何食品", "外國商品的品質一定比臺灣好"], a: 1, exp: "詳解：全球化加速了跨國商品的流通，使消費者在本地就能輕鬆買到世界各國的商品，豐富了物質生活。" },
{ q: "有些外來物種（如小花蔓澤蘭、福壽螺）被引進臺灣後，因為在本地沒有天敵且適應力極強，導致本土物種大量死亡。這會直接破壞臺灣環境的哪一項特點？", options: ["生物多樣性", "地震發生的頻率", "土壤的肥沃度", "氣溫的四季變化"], a: 0, exp: "詳解：強勢的外來入侵種會掠奪本土生物的生存空間，導致本土物種減少甚至滅絕，嚴重危害生態系的生物多樣性。" },
{ q: "關於《中華民國憲法》中保障人民的「受教育權」，下列哪一項敘述是正確的？", options: ["只有家裡富有的人才可以上學", "人民有接受國民教育的權利與義務", "上不上學完全由學生自己決定，政府管不著", "只有男生可以上學，女生不行"], a: 1, exp: "詳解：憲法規定人民有受教育的權利與義務，政府據此實施義務教育，確保每位國民都能獲得基本的教育機會。" },
{ q: "小明的媽媽出門購物時，都會攜帶購物袋，並且儘量選擇印有環保標章的廚房用品。這種消費行為在現代社會被稱為什麼？", options: ["盲目消費", "綠色消費（或永續消費）", "過度消費", "信用消費"], a: 1, exp: "詳解：綠色消費是指消費者在購買商品時，優先考慮對環境衝擊較小、省資源、低污染的產品，並減少不必要的浪費。" },
{ q: "每當臺灣舉行九合一地方選舉或總統大選時，具有投票權的公民都可以去投票所投票。請問我國民主選舉四大原則中的「平等原則」是指什麼？", options: ["每個人投出來的票都要長得一模一樣", "不分性別、貧富、地位，每位符合資格的公民都是「一人一票，每票等值」", "投票時可以由家人代表進去幫忙蓋章", "投票結果必須讓大家都非常高興"], a: 1, exp: "詳解：平等原則強調每位選民在選舉中的權利是完全平等的，任何人都只有一票，且每一票在計算時的影響力都完全相同。" },
{ q: "在資訊社會中，網路上流傳許多教人如何「用感冒藥提煉毒品」或「如何侵入學校電腦更改成績」的影片。面對這些資訊，我們應該怎麼做？", options: ["覺得很酷，立刻跟著影片步驟動手做做看", "利用媒體識讀與法治觀念判斷這是不良且違法的資訊，拒絕模仿並向平台檢舉", "分享給全班同學一起觀看", "把影片當成自己的暑假作業交上去"], a: 1, exp: "詳解：網路資訊五花八門，包含許多違法或危險的內容，公民必須具備正確的判斷力與法治觀念，不盲從、不散播有害資訊。" },
{ q: "小明的爸爸買了一杯外帶咖啡，發現杯子上面印有「環保標章」與「碳足跡標章」。關於標章的用途，下列何者正確？", options: ["用來證明這杯咖啡的價錢非常昂貴", "幫助消費者識別符合環保、減碳理念的商品，作為綠色消費的參考", "純粹是商家的裝飾圖案，沒有任何實質意義", "代表這杯咖啡是從外國進口的"], a: 1, exp: "詳解：政府推行各類環境標章（如環保、節能、省水、碳足跡等），目的是讓消費者在購買時能清楚辨識哪些是綠色商品。" },
{ q: "「臺灣因為工資與土地成本上升，許多傳統的紡織、製鞋工廠將生產線移往東南亞，而臺灣總部則轉向研發與品牌行銷。」這種跨國合作模式在經濟學上稱為什麼？", options: ["國際分工", "地方自治", "關稅壁壘", "區域衝突"], a: 0, exp: "詳解：國際分工是指跨國企業根據各國的優勢（如勞工成本、科技技術、天然資源）來分配生產流程，以降低成本並提升效率。" },
{ q: "下列哪一個中央政府機關，主要掌管我國「全國的治安維護、戶政管理、警政及地方自治事務」？", options: ["國防部", "內政部", "法務部", "經濟部"], a: 1, exp: "詳解：內政部是我國非常重要的中央行政機關，掌管人口、戶政、警政、消防、地方自治及國土管理等內部民政事務。" },
{ q: "當我們在網路上玩線上遊戲時，如果隨意盜取他人的遊戲虛擬寶物，或是在聊天室使用不雅字眼辱罵其他玩家，可能會觸犯哪一部法律？", options: ["只有遊戲公司的處罰，不會犯法", "刑法（如妨害電腦使用罪、公然侮辱罪）", "著作權法", "個人資料保護法"], a: 1, exp: "詳解：網路世界受法律規範，盜取他人虛擬帳號寶物屬於犯罪，在網路公開空間辱罵他人也構成公然侮辱，應謹言慎行。" },
{ q: "清領後期臺灣開放通商口岸後，「茶葉、樟腦、砂糖」成為當時著名的「台灣三寶」，大量外銷。請問當時主要是由哪一個政府官員積極推動臺灣的現代化建設（如鐵路、電報）？", options: ["沈葆楨", "丁日昌", "劉銘傳", "施琅"], a: 2, exp: "詳解：劉銘傳擔任臺灣首任巡撫期間（清領後期），大力推動興建鐵路、架設電報、設立郵局等建設，被譽為臺灣現代化之父。" },
{ q: "臺灣在1990年代實施了「全民健康保險」（健保）制度。關於健保制度的核心精神與好處，下列何者正確？", options: ["讓有錢人可以天天住高級醫院健檢", "透過大家共同繳納保費，分擔彼此的醫療風險，保障國民生病時能獲得公平的醫療照顧", "這項制度是日本人在日治時期留下來的完美建設", "保費全部由醫生負擔，人民不用出一毛錢"], a: 1, exp: "詳解：健保屬於社會保險，採「互助共濟」精神，藉由集體力量分擔醫療費用，避免人民因病而陷入貧窮，是重要的社會福利。" },
{ q: "少子化與高齡化是臺灣目前面臨的兩大人口問題。當一個國家的「出生率持續下降，且老年人口比例持續上升」，未來社會最直接面臨的挑戰是？", options: ["學校的學生太多，教室不夠用", "勞動人口（工作人口）減少，扶養負擔加重", "房價會因為人口變多而越來越貴", "政府的稅收會多到花不完"], a: 1, exp: "詳解：少子高齡化會導致青壯年勞動力人口萎縮，而需要被照顧的老年人口增加，造成社會生產力下降與醫療、養老負擔加重。" },
{ q: "小華在網路上看到一則宣稱「某知名藝人意外過世」的新聞，他覺得很震驚。請問他該怎麼做才符合「資訊素養」？", options: ["立刻轉發到家庭和班級群組，告訴大家這個驚人的消息", "不輕信、不轉發，先到官方大型新聞網站或反查證網站（如MyGoPen、事實查核中心）確認是否為假新聞", "在該則新聞底下留言痛哭", "立刻打電話去該藝人的經紀公司大罵"], a: 1, exp: "詳解：具備媒體識讀能力的公民，面對震驚或誇張的網路訊息時會保持理性，先動手查證而不盲目轉發謠言。" },
{ q: "在現代民主法治國家中，法律最主要、最重要的存在目的是什麼？", options: ["為了讓政府官員可以隨心所欲地處罰人民", "為了保障人民的基本權利，並維護社會的公平與秩序", "為了限制人民的所有自由，讓大家都聽話", "為了幫國家賺取大量的罰款收入"], a: 1, exp: "詳解：法律的基本精神是以維護社會正義、保護人民生命財產與基本人權為核心，並透過規範讓社會有秩序地運作。" },
{ q: "清領後期，因為外國商船在臺灣海岸發生船難，進而引發了「牡丹社事件」，導致日本派兵攻打臺灣原住民。請問當時清廷派哪一位大臣來臺灣加強防務，並實施開山撫番？", options: ["施琅", "劉銘傳", "沈葆楨", "丁日昌"], a: 2, exp: "詳解：1874年牡丹社事件發生後，清廷體會到臺灣戰略地位重要，派遣沈葆楨來台積極建設，廢除渡台禁令並開闢山路通往東部。" },
{ q: "日治初期，日本政府在臺灣進行了三項非常精準的「三大基礎調查」，作為統治與課稅的依據。請問這三大調查「不包括」下列何者？", options: ["土地調查", "人口調查（國勢調查）", "舊慣（風俗習慣）調查", "礦產與黃金調查"], a: 3, exp: "詳解：日治初期總督府推行土地、人口與舊慣調查，全面掌握臺灣的財政、人力與社會結構，為現代化治理奠定基礎。" },
{ q: "日治時期，政府在臺灣極力推行「放足斷髮」運動。請問這項運動的主要目的是要革除傳統社會的哪兩項舊習俗？", options: ["吸食鴉片與亂丟垃圾", "女性纏足與男性留辮子", "不守時與不講衛生", "隨地吐痰與賭博"], a: 1, exp: "詳解：日本政府視「纏足」與「剃髮留辮」為不文明的舊習，透過推廣運動將其革除，以迎向現代化社會。" },
{ q: "1920年代，林獻堂等人創立了「臺灣文化協會」，透過舉辦讀報社、講習會、巡迴演講等方式，其最主要的目的為何？", options: ["募集資金購買武器抗日", "啟迪台灣人的民族意識與提升文化水準", "鼓勵台灣人全面皇民化", "推廣日本神道教信仰"], a: 1, exp: "詳解：臺灣文化協會是日治時期文化啟蒙的核心組織，由蔣渭水、林獻堂等人發起，旨在喚醒臺灣人的現代意識與抗爭精神。" },
{ q: "日治時期，台灣第一位獲得日本帝國大學醫學博士學位，並在杜聰明先生之前積極投入鴉片癮治療研究的著名社會運動家是誰？", options: ["蔣渭水", "林獻堂", "賴和", "杜聰明"], a: 0, exp: "詳解：蔣渭水醫師不僅積極創立文化協會、民眾黨，本身也是當年的醫學菁英，一生為爭取台灣人的權益奔走。" },
{ q: "民國38年（1949年），政府遷台並頒布了哪一項長達38年的法令，凍結了人民的部分憲法權利，直到民國76年（1987年）才由蔣經國總統宣布解除？", options: ["臨時條款", "戒嚴令", "動員戡亂時期臨時條款", "土地改革法"], a: 1, exp: "詳ec：臺灣省戒嚴令從1949年實施至1987年，是世界上實施時間極長的戒嚴之一，解嚴後臺灣才加速民主化。" },
{ q: "民國68年（1979年）在高雄發生的「美麗島事件」，對臺灣民主發展有巨大的影響。請問這個事件的核心訴求是什麼？", options: ["抗議日本強佔釣魚台", "反對兩岸通商", "爭取民主、自由，要求解除戒嚴與開放黨禁", "要求政府推行週休二日"], a: 2, exp: "詳解：美麗島事件雖然遭到政府鎮壓，但喚醒了海內外台灣人的民主意識，凝聚了後來的反對黨勢力。" },
{ q: "我國中央政府組織中，掌管「公務人員的考試、任用、銓敘，以及專業技術人員執照考試」的是哪一個院？", options: ["行政院", "監察院", "考試院", "司法院"], a: 2, exp: "詳解：考試院為我國最高考試機關，獨立行使職權，負責國家文官體制的公平選拔。" },
{ q: "當政府計畫在你的家鄉附近興建一座大型的廢棄物掩埋場，身為社區的一員，下列哪一種參與公共事務的方式「最不恰當」？", options: ["參加政府舉辦的聽證會或說明會表達意見", "夥同鄰居深夜去砸毀公務車或痛打官員", "透過地方議員向相關單位提出質詢與關切", "發起理性平和的聯署與遊行抗議"], a: 1, exp: "詳解：公民參與應在民主法治的框架下理性進行，暴力破壞與人身攻擊屬於違法行為，無法真正解決爭議。" },
{ q: "為了保障弱勢族群的權益，我國《憲法增修條文》中特別規定，在立法委員的席次中，必須保留一定比例的席次給哪一個族群？", options: ["原住民族", "新住民", "身心障礙者", "外籍勞工"], a: 0, exp: "詳解：憲法保障原住民族的政治參與權，特別為平地原住民及山地原住民設有保障的立法委員席次。" },
{ q: "關於台灣與各國簽訂「自由貿易協定」（FTA）的主要目的，下列敘述何者正確？", options: ["為了限制外國人來台灣旅遊", "為了降低跨國貿易的關稅與壁壘，促進商品的出口與經濟合作", "為了讓台灣全面改用外國貨幣", "為了切斷與其他國家的外交關係"], a: 1, exp: "詳解：FTA（Free Trade Agreement）旨在消除貿易障礙，讓簽約國之間的商品能享有免稅或低關稅優惠，提升產業競爭力。" },
{ q: "「臺灣雖然面積不大，但高科技產業發達，許多國際NGO組織（如無國界醫生、國際特赦組織）在世界救援時，臺灣民間也常捐助大量物資與資金。」這代表臺灣在地球村中扮演什麼角色？", options: ["只顧自己發財的自私公民", "積極貢獻力量的「負責任的世界公民」", "完全被孤立且毫無影響力的隱形島嶼", "專門依賴外國救濟的落後地區"], a: 1, exp: "詳解：臺灣透過經濟、科技與人道援助，展現出豐沛的民間軟實力，是國際社會中一股溫暖、積極的正面力量。" },
{ q: "近年來因為地球暖化造成海平面上升，太平洋上有些低海拔的島國（如吐瓦魯）正面臨國土被淹沒的危機。面對這類全球環境難題，臺灣小學生可以做些什麼？", options: ["這完全不干臺灣的事，不用理會", "反正在臺灣吹冷氣就好，不用管別人的生死", "在生活中落實節能減碳，並關心氣候難民的國際新聞", "大量購買塑膠製品來幫忙造路"], a: 2, exp: "詳解：全球環境議題相依相存，小學生在日常生活中少用塑膠、節約用電，就是關懷全球環境的具體實踐。" },
{ q: "我國的《消費者保護法》中規定，商品包裝上必須清楚標示成分、製造商資訊、有效日期等。這主要是為了保障消費者的哪一項權利？", options: ["獲得安全商品的權利", "知情權（獲得正確資訊的權利）", "自由選擇的權利", "無條件打折的權利"], a: 1, exp: "詳解：清楚的商品標示能讓消費者在購買前掌握充分且真實的資訊，避免買到過期或成分不明的黑心商品。" },
{ q: "現代社會注重「性別平等」，在校園中如果發生了因為性別、性傾向而產生的欺凌、不尊重甚至性騷擾事件，學校應依據哪一部法律進行調查與輔導？", options: ["勞動基準法", "性別平等教育法", "個人資料保護法", "著作權法"], a: 1, exp: "詳解：《性別平等教育法》旨在促進性別地位之實質平等，消除性別歧視，營造友善且安全的校園環境。" },
{ q: "清領後期，台灣茶葉能大量外銷世界，在國際上以「Formosa Oolong Tea（福爾摩沙烏龍茶）」聞名，主要得力於哪一位英國商人在大稻埕設立洋行大力推廣？", options: ["馬偕", "約翰·陶德（John Dodd）", "巴克禮", "湯姆生"], a: 1, exp: "詳解：約翰·陶德引進安溪茶苗，並與李春生合作引進新式製茶技術，成功將臺灣烏龍茶推向世界舞台。" },
{ q: "日治時期，總督府在台灣西部興建了一條南北貫通的交通大動脈，對島內人員與物資流動有革命性的影響。請問這是指哪一項建設？", options: ["台灣高鐵", "中山高速公路", "縱貫鐵路", "蘇花公路"], a: 2, exp: "詳解：1908年基隆到高雄的「縱貫鐵路」全線通車，打破了過去南北交通的險阻，使臺灣正式形成「一日生活圈」與全島一體化市場。" },
{ q: "在資訊社會中，我們在使用學校電腦或公共Wi-Fi登入帳號密碼後，最好的資安習慣是什麼？", options: ["直接關掉瀏覽器視窗就離開", "點選「記住密碼」，方便下一個人使用", "確實點選「登出」或「註銷」，並清除瀏覽器紀錄", "把帳號密碼用立可白寫在桌上以免忘記"], a: 2, exp: "詳解：公共設備容易留存個人隱私數據，若未落實登出，極易遭到後續使用者盜用帳號或竊取個資。" },
{ q: "關於台灣推行「九年國民義務教育」實施前後的轉變，下列敘述何者錯誤？", options: ["實施後，國小畢業生不需經過初中聯考就能直接升學", "實施後，國民整體的知識水準與文化素質大幅提高", "這項政策是在民國57年（1968年）正式掛牌上路", "實施後，每個學生都必須強制住校讀書"], a: 3, exp: "詳解：九年國教普及了初中（國民中學）教育，免去了過往窄門的初中聯考，但並未強制學生住校。" },
{ q: "「地球村」的便利帶來了許多商機，但也加速了傳染病的跨國傳播。為了阻絕傳染病擴散，我國中央政府設立了哪一個專責單位來掌管疾病管制與防疫政策？", options: ["衛生福利部疾病管制署（CDC）", "環境保護部", "外交部領事事務局", "內政部警政署"], a: 0, exp: "詳解：衛福部疾管署（CDC）負責全國傳染病防疫、出入境檢疫與疫苗接種調配，是臺灣公共衛生的核心防線。" },
{ q: "清領後期，因為哪一場涉外戰爭爆發（法軍進攻基隆與澎湖），讓清廷驚覺臺灣戰略地位的重要，於是在西元1885年正式宣布臺灣建省？", options: ["中法戰爭", "甲午戰爭", "鴉片戰爭", "英法聯軍"], a: 0, exp: "詳解：1884年中法戰爭波及臺灣，劉銘傳成功守住北臺灣。戰後清廷意識到臺灣海防地位關鍵，於1885年宣布臺灣建省，並派劉銘傳為首任巡撫。" },
{ q: "日治初期，總督府將哪三項臺灣傳統的社會風習視為「三大陋習」，並透過教育、警察力量與民間組織逐步加以革除？", options: ["賭博、隨地吐痰、不守時", "吸食鴉片、男子留辮、女子纏足", "不注重衛生、不拜神明、不讀日文", "不吃日本料理、穿唐裝、過農曆年"], a: 1, exp: "詳解：日治時期積極推動「漸禁鴉片」以及「放足斷髮」運動，將吸鴉片、留辮子、纏足列為三大舊社會陋習並成功革除。" },
{ q: "1970年代，臺灣面臨國際外交困境與石油危機，當時的行政院長蔣經國推動了「十大建設」。下列哪一項「不屬於」當時十大建設的項目？", options: ["臺灣高鐵", "中山高速公路", "中正國際機場（今桃園機場）", "臺中港"], a: 0, exp: "詳解：臺灣高鐵是在西元2007年（民國96年）正式通車營運，不屬於1970年代的十大建設。十大建設的交通項目包括南北高速公路、桃園機場、臺中港、蘇澳港、鐵路電氣化及北迴鐵路。" },
{ q: "我國地方政府的組織中，負責「監督地方行政機關、審查地方政府預算並反映地方民意」的是哪一個單位？", options: ["地方民意機關（如縣市議會、鄉鎮市民代表會）", "地方行政機關（如縣市政府、鄉鎮市公所）", "警察局", "法院"], a: 0, exp: "詳解：地方民意機關（如縣市議會）負責審查地方預算、制定地方自治法規並質詢縣市長，扮演監督地方行政機關的角色。" },
{ q: "關於個人資料（個資）的保護，在日常生活中哪一種行為最容易讓自己的隱私陷入被詐騙的風險中？", options: ["在公共網路問卷上隨意填寫真實姓名、身分證字號與手機號碼", "拒絕在不明網頁上輸入信用卡卡號", "定期更換電子郵件與社群網站的密碼", "收到不明簡訊時不點選其中的超連結"], a: 0, exp: "詳解：在不安全的網路環境或來路不明的活動問卷中提供詳細個資，極易遭到不肖人士蒐集並作為詐騙工具。" },
{ q: "臺灣的黑面琵鷺保育成果享譽國際。請問這類每年隨著季節更替，定期在不同地區之間長途遷徙的鳥類，在生態學上統稱為什麼？", options: ["留鳥", "候鳥", "迷鳥", "外來種"], a: 1, exp: "詳解：候鳥會隨季節變化而集體遷徙。臺灣位於東亞—澳亞候鳥遷徙線上，是許多北太平洋候鳥重要的度冬站。" },
{ q: "當我們去餐廳用餐時，如果發現點的餐點裡有蟑螂或過期變質的食物，導致身體不適。這時我們應依據哪一部法律向店家要求損害賠償？", options: ["個人資料保護法", "消費者保護法", "著作權法", "環境保護法"], a: 1, exp: "詳解：《消費者保護法》專門保障消費者的安全與權益，商家提供的食品若不具備安全性導致消費者受損，應負賠償責任。" },
{ q: "在民主社會中，媒體被稱為「第四權」，扮演監督政府的重要角色。但近年來網路上常有「標題誇大、內容未經查證」的點閱率至上新聞。這提醒我們應具備什麼能力？", options: ["盲目按讚分享的能力", "媒體識讀與獨立思考的能力", "在留言區跟著謾罵的能力", "完全不看任何新聞的能力"], a: 1, exp: "詳解：媒體識讀能力能幫助我們在面對氾濫的網路訊息時，懂得辨識真偽、分析媒體立場，而不被偏頗或虛假的報導誤導。" },
{ q: "我國中央政府實施「五權分立」，其中負責「糾彈全國違法失職的公務人員，並審計政府每年財政決算」的是哪一個機關？", options: ["立法院", "司法院", "考試院", "監察院"], a: 3, exp: "詳解：監察院是我國最高監察機關，擁有彈劾、糾舉、糾正權，並設有審計部負責審核政府的財政決算。" },
{ q: "關於「世界遺產」的分類，主要分為文化遺產、自然遺產以及新型態的複合遺產。臺灣雖然因為政治因素不是聯合國會員，但仍選出了許多潛力點。下列哪一個最可能屬於「自然遺產」潛力點？", options: ["太魯閣國家公園的峽谷景觀", "大稻埕歷史老街", "淡水紅毛城及週邊古蹟", "臺南孔廟"], a: 0, exp: "詳解：太魯閣國家公園擁有獨特的大理岩峽谷與雄偉的斷崖地形，展現傑出的自然美景與地質演化歷史，屬於自然遺產範疇。" },
{ q: "全球化帶來的跨國分工，雖然讓產品售價降低，但也可能帶來什麼樣的社會問題？", options: ["所有國家的年輕人都找不到工作", "在地傳統手工業可能因為無法與低價進口貨競爭而面臨失傳", "各國的文化從此完全隔絕", "跨國交通變得越來越慢"], a: 1, exp: "詳解：全球化促使大量低價商品湧入，往往會對本土傳統產業、在地小農或手工業造成強烈衝擊，需要透過轉型或文創化來尋求出路。" },
{ q: "依據我國現行法律規定，年滿幾歲的公民才享有合法的「公民投票權（公投權）」，可以對國家重大政策投票表達意見？", options: ["16歲", "18歲", "20歲", "23歲"], a: 1, exp: "詳解：我國《公民投票法》已修正將公投權年齡調降至18歲；但要注意，涉及選出公職人員的「選舉權」在現行憲法中仍維持20歲。" },
{ q: "小明的媽媽去大賣場買了一台冷氣機，上面貼有「能源效率第1級」的標籤。關於這個標籤的意義，下列何者正確？", options: ["代表這台冷氣機非常耗電", "第1級代表「最省電」、能源效率最高，對環境負擔最小", "代表這台冷氣完全不需要插電", "代表這是最便宜的劣等貨"], a: 1, exp: "詳解：我國能源效率分級標籤中，第1級代表能源效率最高、最省電；級數越高（如第5級）則越耗電。" },
{ q: "下列哪一項行為，屬於在生活中實踐「國際人道關懷」的好表現？", options: ["嘲笑班上新住民同學的口音", "當外國發生大地震時，捐出零用錢或物資協助災後重建", "認為外國遭受戰爭侵略跟臺灣沒有任何關係", "拒絕購買任何外國製造的商品"], a: 1, exp: "詳解：跨越國界與種族，對世界上正遭受天災或戰亂的人民伸出援手，是地球村時代世界公民展現人道關懷的具體行動。" },
{ q: "當我們在網路上寫作、畫畫或是拍攝影片上傳到YouTube，只要作品一完成，就立刻受到哪一部法律的保護，未經同意他人不得任意盜用？", options: ["個人資料保護法", "著作權法", "專利法", "商標法"], a: 1, exp: "詳解：著作權採「原創即保護」原則，創作者完成文學、藝術、科學等作品時，便自動享有著作權保障。" },
{ q: "日治時期，台灣人創辦了《台灣民報》，當時被譽為「台灣人唯一的言論機關」。這份報紙主要是由哪一個組織發行，用來批評日本殖民統治的不公？", options: ["台灣文化協會", "台灣民眾黨", "保甲組織", "皇民奉公會"], a: 0, exp: "詳解：1923年由林獻堂、蔣渭水等人在日本東京創辦《台灣民報》，後遷回臺灣發行，成為台灣文化協會及知識份子向民眾傳播現代思想、批判總督府政策的重要管道。" },
{ q: "清領後期，馬偕醫學博士來到臺灣北部傳教，除了傳播基督教信仰，他還對臺灣社會做出了什麼重大貢獻？", options: ["興建了臺灣第一條鐵路", "創立牛津學堂與滬尾偕醫館，引進西式教育與西方醫術", "協助清廷攻打原住民", "推動臺灣建省"], a: 1, exp: "詳解：馬偕牧師在大淡水地區深入民間，透過創辦「滬尾偕醫館」（馬偕醫院前身）免費為百姓拔牙、治病，並創立「牛津學堂」引進西方科學教育。" },
{ q: "在網路社群平台上，如果有人利用假帳號散布謠言，故意毀壞班上某位同學的名譽，這種行為在法律上可能會觸犯刑法的什麼罪？", options: ["竊盜罪", "公然侮辱罪或誹謗罪", "妨害投票罪", "強盜罪"], a: 1, exp: "詳解：在公開的網路空間散布足以毀損他人名譽的文字或謠言，會觸犯刑法的誹謗罪或公然侮辱罪，網路發言必須負法律責任。" },
{ q: "臺灣在西元2002年以「臺澎金馬個別關稅領域」的名義，正式加入了哪一個重要的全球性經貿組織，與世界各國進行更平等的貿易交流？", options: ["聯合國（UN）", "世界貿易組織（WTO）", "世界衛生組織（WHO）", "亞太經濟合作會議（APEC）"], a: 1, exp: "詳解：臺灣於2002年正式加入世界貿易組織（WTO），在降低關稅、拓展國際工業貿易的同時，也面臨了外國農產品進口的競爭壓力。" },
{ q: "關於社會變遷中「新住民家庭」在臺灣的生活，下列哪一種態度最能展現民主與多元包容的素養？", options: ["強迫新住民配偶必須立刻忘記母國的語言和習俗", "歧視新住民子女，認為他們的學習能力一定比較差", "主動關懷、互相學習並欣賞彼此的文化差異，營造友善環境", "認為新住民文化會破壞臺灣原本的傳統"], a: 2, exp: "詳解：臺灣已是多元文化社會，以尊重、開放、不帶偏見的態度與新住民互動，共同建立和諧社區，是現代公民的重要素養。" },
{ q: "臺灣沿海某些地區（如彰化、雲林、嘉義一帶）因為長期過度抽取地下水發展養殖漁業，導致發生了哪一種嚴重的環境地質災害？", options: ["土石流", "地盤下陷（地層下陷）", "火山噴發", "沙塵暴"], a: 1, exp: "詳解：長期超抽地下水速度大於補注速度，會導致地下土層壓密，引發嚴重地層下陷，造成沿海地區每逢大雨或大潮就淹水。" },
{ q: "綠鬣蜥、綠水龍等外來種寵物被不當棄養後，在臺灣南部的野外大量繁殖，破壞了原本的生態平衡。面對這種狀況，最正確的觀念是什麼？", options: ["外來種動物比較漂亮，應該多放生到野外", "飼養寵物前應三思，養了就要「負責到底、絕不棄養」", "只要看到不喜歡的野生動物，就可以隨意毒殺", "把外來種全部抓起來賣給外國賺錢"], a: 1, exp: "詳解：源頭管制是防止外來種入侵的最佳方法。飼主應具備責任感，絕對不能任意將外來寵物野放，以免侵害本土物種的生存空間。" },
{ q: "依據我國《憲法》規定，人民有依法「納稅」的義務。政府課徵稅收的最主要目的是什麼？", options: ["為了讓政府官員可以過奢華的生活", "募集國家建設、推動社會福利與公共服務所需的資金", "強迫減少人民的存款，以防止大家亂花錢", "為了跟外國政府比拼誰的稅收多"], a: 1, exp: "詳解：稅收是國家財政的最主要來源。政府利用稅收來興建學校、修築道路、維持治安、提供全民健保與社會福利，達到服務全民的目的。" },
{ q: "當我們去便利商店或餐廳消費後，結帳時店家會給我們「統一發票」或存入載具。請問索取統一發票最主要的功能是什麼？", options: ["純粹為了好玩可以參加中獎對獎", "證明這家店的商品非常昂貴", "防止商家逃漏稅，確保國家能課徵到正確的營業稅", "可以當作書籤來使用"], a: 2, exp: "詳ec：統一發票是商家營業額的法定憑證。要求商家開立發票能核實其營業收入，防止漏報稅額，是公民維護國家財政的守法表現。" },
{ q: "小明的阿公今年已經80歲了，政府提供了「長照 2.0」（長期照顧服務）的協助，有專人到家裡幫忙洗澡與復健。這屬於政府哪一方面的公共支出？", options: ["國防外交支出", "經濟發展支出", "社會福利與醫療保健支出", "教科文（教育科學文化）支出"], a: 2, exp: "詳解：因應高齡社會，照顧失能、高齡長者的長照服務屬於「社會福利與社會救助」範疇，旨在減輕家庭照顧負擔，落實弱勢保障。" },
{ q: "我國中央政府每年都要編列「預算案」，詳細規劃預計有多少收入、要花多少錢。請問這個年度總預算案，必須送交哪一個機關負責「審查與刪減」？", options: ["行政院", "立法院", "司法院", "監察院"], a: 1, exp: "詳解：行政院負責「編列」總預算案，並送交代表民意的「立法院」進行審議、質詢與刪減，通過後才能執行，以達到監督政府荷包的功能。" },
{ q: "傳統觀念常認為「男生應該學理工、賺錢養家；女生應該學文科、在家帶小孩」。現代社會強調打破這種限制，這被稱為什麼？", options: ["打破性別刻板印象", "維持傳統美德", "國際勞動分工", "資訊素養展現"], a: 0, exp: "詳解：性別刻板印象是指對特定性別抱持僵化、偏頗的期望。現代社會強調依據個人興趣與才能發展，不應受性別框限。" },
{ q: "關於台灣新住民在日常生活中所面臨的挑戰，下列哪一項「不是」政府目前積極提供協助的項目？", options: ["舉辦中文與台語學習班，克服語言隔閡", "強迫新住民全面更改為臺灣傳統的漢人姓名", "提供就業輔導與諮詢專線", "在政府網站提供多國語言的母國文字服務"], a: 1, exp: "詳解：政府尊重多元文化，新住民依法享有保留或更改姓名的自由，絕不會強制其放棄母國姓名，那是違反人權與多元精神的。" },
{ q: "臺灣的竹科、中科、南科等科學園區，聚集了世界頂尖的半導體製造廠（如台積電）。這種產業聚落為臺灣在全球化經濟中帶來了什麼核心競爭力？", options: ["擁有全球最便宜、無限供應的天然石油", "高效率、高技術與無法輕易被取代的「全球高科技供應鏈關鍵地位」", "可以完全不用跟外國進行經貿交流", "臺灣土地面積居世界第一"], a: 1, exp: "詳解：臺灣憑藉專業的技術、精準的晶片製造與完整的科技供應鏈，在世界科技與經濟板塊中占有舉足輕重、動輒影響全球的關鍵位置。" },
{ q: "近年來網路上常有「網路釣魚」詐騙，黑客會做一個假的銀行網頁或郵局網頁，騙你輸入密碼。這種侵害人民財產與隱私的安全威脅統稱為什麼？", options: ["國際分工危機", "個人環境污染", "資訊安全（資安）威脅", "環境影響評估失靈"], a: 2, exp: "詳解：假網頁、木馬病毒、盜刷等皆為資訊安全難題。在使用數位網路時，應認清官方網址，不點來路不明連結，保護隱私安全。" },
{ q: "下列哪一種行為，屬於最基本、人人都能在生活中實踐的「環境永續生活」？", options: ["洗手時把水龍頭開到最大，洗完不關", "出門用餐自備環保筷，減少使用一次性竹筷", "房間沒人也把電燈和冷氣全部開著", "把用不到的垃圾偷偷倒進河川裡"], a: 1, exp: "詳解：自備環保餐具能從源頭減少免洗筷（消耗木材與漂白劑）的垃圾量，是每個人在生活中都能做到的綠色永續好表現。" },
{ q: "當我們在使用網路社群軟體（如Line、IG）時，如果未經同學同意，就把同學私底下的搞笑照片或出糗影片公開傳到網路上，可能會侵害同學的什麼權利？", options: ["受教育權", "隱私權與肖像權", "著作權", "財產權"], a: 1, exp: "詳ec：每個人都有不願公開的私人生活秘密（隱私權），以及對自己個人形象的控制權（肖像權）。未經同意散布他人照片屬於侵害權利之行為。" },
{ q: "關於我國《消費者保護法》所規範的「七天鑑賞期」，下列哪一種購買管道「不適用」這個保障，消費者不能隨意要求無條件退貨？", options: ["在網路購物網站買衣服", "在電視購物台買果汁機", "親自走到實體大賣場挑選並購買腳踏車", "接到推銷電話購買雜誌"], a: 2, exp: "詳解：消保法七天鑑賞期主要針對「無法當場檢視商品」的特種買賣（如網購、電視購物、郵購）。如果是親自到實體店面看貨購買，原則上不適用無條件退貨，除非商品本身有瑕疵。" },
{ q: "在世界貿易組織（WTO）的架構下，各國互相降低關稅。這對台灣小農（種植稻米、水果的農夫）最直接帶來的挑戰是？", options: ["外國低價農產品大量進口，帶來激烈的價格競爭壓力", "台灣會完全買不到外國的種子", "政府會禁止農民種植作物", "農產品完全無法賣到國外"], a: 0, exp: "詳解：加入WTO後，台灣實施工業產品外銷免稅，但同時也必須開放外國農產品進口，使本土農業面臨外國低價水果、肉品的競爭衝擊。" },
{ q: "清領後期，因為台灣哪一種珍貴物資在國際上需求量極大（可用於製造賽璐珞工業原料及醫藥），促使漢人大量進入山林與原住民土地開發，引發許多衝突？", options: ["稻米", "蔗糖", "樟腦", "鹿皮"], a: 2, exp: "詳解：臺灣曾是全球最重要的「樟腦」產地。清領後期因應國際工業需求大量提煉樟腦，由於樟樹多生長於山地，導致漢人開發邊界與原住民生活範圍嚴重重疊，衝突加劇。" },
{ q: "日治時期，總督府為了掌控地方基層，實施了保甲制度。請問，如果某個甲（大約十戶）裡面有一個人犯罪逃跑，整個甲的人都要一起受到處罰，這種規定稱為什麼？", options: ["地方自治", "連坐處罰（連坐法）", "法律面前人人平等", "無過失責任原則"], a: 1, exp: "詳解：保甲制度利用「連坐法」讓鄰里之間互相監視、互相控管，一個人犯法全家或全鄰受罰，是殖民政府高壓統治、維持治安的嚴酷手段。" },
{ q: "民國70年代（1980年代），臺灣許多中產階級與知識份子走上街頭，發起了環保運動（如反核、反五輕）、農民運動與學生運動。這反映了當時臺灣社會的什麼轉變？", options: ["人民越來越不守法", "社會運動興起與「公民意識」的覺醒", "經濟陷入嚴重破產", "人民渴望回到日治時期"], a: 1, exp: "詳解：1980年代隨著戒嚴體制走向尾聲，民間累積的社會力量爆發，各類爭取環境、勞工、性別權益的社會運動蓬勃發展，展現了民主公民社會的活力。" },
{ q: "在我國現行的中央政府體制中，如果行政院認為立法院通過的法律案或預算案「窒礙難行」（非常困難、無法執行）時，經總統核可後，可以依法向立法院提出什麼程序，要求立法院重新討論？", options: ["提起訴願", "提出覆議", "發動罷免", "申請釋憲"], a: 1, exp: "詳解：這是憲法上行政院制衡立法院的重要手段，稱作「覆議」。如果立法院維持原決議，行政院長原則上就必須接受或辭職。" },
{ q: "關於全球變遷造成的「島嶼危機」，例如南太平洋的低海拔島國吐瓦魯、馬爾地夫，正面臨滅頂之災。這主要是因為全球暖化引發了什麼現象？", options: ["海底火山連續大噴發", "極地冰川融化導致海水熱膨脹與「海平面上升」", "島嶼底下的地殼急速下沉", "海水被陽光大量蒸發變少"], a: 1, exp: "詳解：溫室效應導致全球氣溫升高，南北極陸地冰川融化流入海洋，加上海水受熱膨脹，兩者共同導致全球海平面上升，淹沒低窪島嶼與沿海城市。" },
{ q: "當我們在電視或網路新聞上，看到關於「某政黨與另一政黨在立法院發生爭執」的報導時，具備良好「媒體識讀」素養的公民應該怎麼做？", options: ["只看一家的報導，並立刻在學校跟同學吵架", "保持理性，多方觀看不同媒體的報導，獨立思考並分析事情的真實原因與不同立場", "新聞太複雜了，以後完全不理會國家大事", "跟著新聞主播的語氣一起生氣謾罵"], a: 1, exp: "詳解：媒體報導往往有其特定的政治立場或為了吸引點閱率而誇大。聰明的世界公民會交叉比對資訊，不盲目被單一媒體牽著鼻子走。" },
{ q: "臺灣各地留有許多清領時期或荷蘭統治時期的「古蹟」（如台南赤崁樓、安平古堡）。關於古蹟的保存，下列哪一種態度是正確的？", options: ["古蹟太老舊了，應該全部拆掉蓋停車場", "古蹟是珍貴的「歷史文化資產」，能幫我們見證先民的生活歷史", "為了發財，可以把古蹟的磚頭拆回家拍賣", "古蹟只能原封不動藏起來，絕對不能讓任何人參觀"], a: 1, exp: "詳解：文化資產古蹟是不可再生的歷史見證，透過適當的保護與活化，能讓後代子孫了解這片土地的過去，並發展在地文化觀光。" },
{ q: "近年來環保團體積極推廣「低碳飲食」，鼓勵大家多吃「在地食材」，減少購買外國進口水果。這主要是為了降低哪一項指標，達到減碳效果？", options: ["食物的售價", "食物里程（Food Miles）", "食物的卡路里", "食物的重量"], a: 1, exp: "詳ec：食物里程是指食物從生產地運送到消費者餐桌上的距離。進口食品因為跨國長途運輸（搭飛機或輪船）會消耗大量化石燃料、排放大量二氧化碳，因此選擇在地食材、縮短食物里程更環保。" },
{ q: "臺灣的原住民族擁有豐富的文化，例如阿美族的豐年祭、布農族的八部合音、達悟族的飛魚祭。為了保護與傳承這些珍貴的文化，政府制定了哪一部法律？", options: ["個人資料保護法", "原住民族基本法", "野生動物保育法", "勞動基準法"], a: 1, exp: "詳解：《原住民族基本法》旨在保障原住民族基本權利，促進原住民族生存發展，並維護、傳承其獨特的語言、文化與傳統習俗。" },
{ q: "關於臺灣在西元1995年實施的「全民健康保險」（健保）制度，下列哪一項敘述是「錯誤」的？", options: ["屬於社會福利與社會保險的一環", "核心精神是大家繳保費「互助共濟」，分擔醫療風險", "保費全部由醫生負擔，普通人民不用出一毛錢", "保障了國民生病時，不論貧富都能獲得公平的醫療照護"], a: 2, exp: "詳解：全民健保的保費是由「民眾、雇主（老闆）與政府」三方依比例共同分擔，並非由醫生負擔。它成功避免了人民因病而陷入貧窮的危機。" },
{ q: "在民主社會中，人民可以依法組成政黨、社會團體或利益團體，向政府表達意見。這項權利受到憲法保障的哪一種基本自由？", options: ["人身自由", "居住遷徙自由", "結社自由", "秘密通訊自由"], a: 2, exp: "詳解：憲法第十四條規定「人民有集會及結社之自由」，其中「結社自由」就是保障人民依法組織團體（如政黨、文教基金會、工會）以共同實現特定目標的權利。" },
{ q: "小華在網路上看到一張非常漂亮的插畫，他未經畫家同意，就把這張圖當成自己班級班服的圖案並印刷販售。這種行為觸犯了哪一部法律？", options: ["個人資料保護法", "著作權法", "消費者保護法", "勞動基準法"], a: 1, exp: "詳解：插畫屬於原創的藝術著作，一完成就受到《著作權法》的保護。未經著作權人授權，擅自「重製」（影印、印刷）或用於商業販售，屬於侵害智慧財產權的違法行為。" },
{ q: "政府的公共支出分為許多種類。當政府花錢興建國民小學的班班有冷氣設備、擴建中央研究院的實驗室、以及補助偏鄉學校的圖書資金。這屬於哪一類的政府支出？", options: ["經濟發展支出", "國防外交支出", "教育科學文化支出（教科文）", "社會福利支出"], a: 2, exp: "詳解：政府補助學校、發展科學研究、維護文教古蹟等經費，皆屬於「教育科學文化支出」，這對提升國家長遠的競爭力與國民素質非常重要。" },
{ q: "在台灣，當人民對於縣市政府或中央部會的行政處分（例如覺得被環保局不小心開錯罰單）感到不服、認為自己的權利受損時，第一個步驟可以向政府提起什麼程序來要求重新審查？", options: ["提起訴願", "提起行政訴訟", "罷免縣市長", "向警察局報案"], a: 0, exp: "詳解：依據法律規定，人民若不服行政機關的行政處分，應先向原處分機關或其上級機關提起「訴願」（行政體系內部自我反省）；如果對訴願結果還是不服，才能進一步向行政法院提起「行政訴訟」（打官司）。" },

// 隨機抽選 N 題
function getRandomQuestions(arr, n) {
    let shuffled = arr.slice().sort(() => 0.5 - Math.random());
    return shuffled.slice(0, n);
}

const selectedQuestions = getRandomQuestions(fullBank, 20); // 這裡設定抽20題

// 渲染題目到畫面
function renderQuiz() {
    const container = document.getElementById('quiz-container');
    selectedQuestions.forEach((item, index) => {
        let optionsHtml = item.options.map((opt, i) => `
            <label><input type="radio" name="q${index}" value="${i}"> ${opt}</label>
        `).join('');
        
        container.innerHTML += `
            <div class="quiz-item" id="item-${index}">
                <div class="question">${index + 1}. ${item.q}</div>
                <div class="options">${optionsHtml}</div>
                <div class="explanation" id="exp-${index}">
                    <strong>正確答案：${item.options[item.a]}</strong><br>
                    ${item.exp}
                </div>
            </div>
        `;
    });
}

function submitQuiz() {
    let score = 0;
    selectedQuestions.forEach((item, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        const expDiv = document.getElementById(`exp-${index}`);
        const itemDiv = document.getElementById(`item-${index}`);
        
        expDiv.style.display = 'block'; // 顯示詳解
        
        if (selected && parseInt(selected.value) === item.a) {
            score++;
            itemDiv.style.borderLeft = "5px solid #27ae60";
        } else {
            itemDiv.style.borderLeft = "5px solid #e74c3c";
        }
    });
    
    document.getElementById('result').innerText = `您的得分：${score} / ${selectedQuestions.length}`;
    window.scrollTo(0, document.body.scrollHeight);
}

renderQuiz();
</script>
