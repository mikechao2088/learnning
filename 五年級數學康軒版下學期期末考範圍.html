<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小五下數學期末衝刺題庫 (康軒版200題隨機版)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #ecf0f1;
        }
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }
        .quiz-status {
            background: #e8f4fd;
            border-left: 4px solid var(--accent-color);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 25px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .question-card {
            background: #fcfcfc;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .question-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .question-tag {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 3px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 17px;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .options-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        @media (max-width: 600px) {
            .options-list { grid-template-columns: 1fr; }
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-item:hover {
            background: #f5f6fa;
        }
        .option-item input {
            margin-right: 10px;
            transform: scale(1.2);
        }
        .btn-container {
            margin-top: 30px;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit { background: var(--success-color); }
        .btn-submit:hover { background: #27ae60; }
        .btn-reload { background: var(--accent-color); }
        .btn-reload:hover { background: #2980b9; }
        #result-panel {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            display: none;
        }
        .score-pass { background: #d4edda; color: #155724; }
        .score-fail { background: #f8d7da; color: #721c24; }
        .feedback {
            font-size: 14px;
            margin-top: 10px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>康軒版國小五年級數學期末總複習</h1>
    <div class="subtitle">系統已內建 200 題全真題庫 ‧ 每次隨機抽取 20 題</div>
    
    <div class="quiz-status">
        <span>考試科目：數學 (五下期末範圍)</span>
        <span>題數：20 題 (每題 5 分)</span>
    </div>

    <form id="quiz-form">
        <div id="questions-pool"></div>
        <div class="btn-container">
            <button type="button" id="action-btn" class="btn-submit" onclick="gradeQuiz()">確認交卷讀卡</button>
        </div>
    </form>

    <div id="result-panel"></div>
</div>

<script>
    // 200題專業題庫自動化生成引擎 (嚴格對應康軒五下期末核心指標)
    function generateTwoHundredQuestions() {
        const bank = [];
        let id = 1;

        // 1. 分數的乘法 (共 35 題)
        for(let i = 2; i <= 36; i++) {
            let base = i * 2;
            let num = 3;
            let den = 4;
            let ans = (base * num) / den;
            let qText = `一條繩子長 ${base} 公尺，剪下其中的 ${num}/${den} ，請問剪下的繩子長多少公尺？`;
            if (Number.isInteger(ans)) {
                bank.push({
                    id: id++, tag: "分數的乘法", q: qText,
                    o: [`${ans}公尺`, `${ans - 1}公尺`, `${ans + 2}公尺`, `${ans + 1.5}公尺`], a: 0
                });
            } else {
                let ansStr = (base * num) + "/" + den;
                bank.push({
                    id: id++, tag: "分數的乘法", q: `一桶油重 ${base} 公斤，媽媽炒菜用了 ${num}/${den} 桶，共是用掉多少公斤的油？`,
                    o: [`${base - 1}公斤`, `${ansStr}公斤`, `${base + 1}公斤`, `${num}/${den}公斤`], a: 1
                });
            }
        }

        // 2. 長方體與正方體表面積 (共 35 題)
        for(let i = 3; i <= 37; i++) {
            let side = i;
            let areaCube = side * side * 6;
            bank.push({
                id: id++, tag: "長方體與正方體", q: `一個正方體的每條邊長都是 ${side} 公分，請算出這個正方體的表面積是多少平方公分？`,
                o: [`${side * side}平方公分`, `${side * 12}平方公分`, `${areaCube}平方公分`, `${areaCube - 20}平方公分`], a: 2
            });
            let w = i, l = i + 2, h = i + i;
            let areaBox = (w*l + l*h + w*h) * 2;
            bank.push({
                id: id++, tag: "長方體與正方體", q: `有一個長方體禮盒，長 ${l} 公分、寬 ${w} 公分、高 ${h} 公分，它的表面積是多少平方公分？`,
                o: [`${areaBox}平方公分`, `${w*l*h}平方公分`, `${areaBox + 15}平方公分`, `${(w+l+h)*2}平方公分`], a: 0
            });
        }

        // 3. 體積與容積換算、容器厚度問題 (共 35 題)
        for(let i = 5; i <= 39; i++) {
            let vol_cm3 = i * 1000;
            let liters = i;
            bank.push({
                id: id++, tag: "體積與容積", q: `有一個裝滿水的水箱，水的體積是 ${vol_cm3} 立方公分，請問這相當於是多少公升的水？`,
                o: [`${liters * 10}公升`, `${liters}公升`, `${liters / 10}公升`, `${liters * 100}公升`], a: 1
            });
            let outer_side = i + 4; 
            let inner_side = outer_side - 2; // 厚度1公分，兩邊減2
            let inner_vol = inner_side * inner_side * inner_side;
            bank.push({
                id: id++, tag: "體積與容積", q: `一個無蓋的正方體木盒，外面邊長是 ${outer_side} 公分，木板厚度是 1 公分。這個木盒內部的容積是多少立方公分？`,
                o: [`${outer_side * outer_side * outer_side}立方公分`, `${inner_side * inner_side * outer_side}立方公分`, `${inner_vol}立方公分`, `${inner_vol - 50}立方公分`], a: 2
            });
        }

        // 4. 比率與百分率 (共 35 題)
        for(let i = 1; i <= 35; i++) {
            let total = 20 + i;
            let hit = i;
            let rate = (hit / total * 100).toFixed(1);
            bank.push({
                id: id++, tag: "比率與百分率", q: `籃球隊員練投，總共投了 ${total} 球，進了 ${hit} 球，請問這場練習的進球率（用百分率表示，四捨五入到小數點後第一位）大約是多少？`,
                o: [`${rate}%`, `${(hit/total).toFixed(2)}%`, `${(total/hit).toFixed(1)}%`, `50%`], a: 0
            });
            let price = 500 + (i * 20);
            let salePrice = price * 0.8;
            bank.push({
                id: id++, tag: "比率與百分率", q: `定價 ${price} 元的球鞋，期末考大特價打八折（20% off）販售，請問買這雙鞋要付多少元？`,
                o: [`${price - 80}元`, `${price * 0.2}元`, `${salePrice}元`, `${price - 20}元`], a: 2
            });
        }

        // 5. 未知數 x 的列式與應用題 (共 30 題)
        for(let i = 10; i <= 39; i++) {
            let cost = i;
            let pay = 100;
            let change = pay - cost;
            bank.push({
                id: id++, tag: "未知數x", q: `妹妹買了一本隨身筆記本花了 x 元，付給店員一包 100 元鈔票，找回 ${change} 元。依題意列出含有未知數的算式，何者正確？`,
                o: [`x - 100 = ${change}`, `100 - x = ${change}`, `x + 100 = ${change}`, `100 + x = ${change}`], a: 1
            });
            let each = i;
            let total_apples = each * 6;
            bank.push({
                id: id++, tag: "未知數x", q: `有一箱蘋果平分裝成 6 盒，每盒有 ${each} 顆。若設整箱蘋果有 x 顆，算式應記為：`,
                o: [`x ÷ 6 = ${each}`, `x × 6 = ${each}`, `6 ÷ x = ${each}`, `x + 6 = ${each}`], a: 0
            });
        }

        // 6. 生活中的大單位 (共 30 題)
        for(let i = 1; i <= 30; i++) {
            let tons = i * 2;
            let kg = tons * 1000;
            bank.push({
                id: id++, tag: "生活中的大單位", q: `有一輛載滿砂石的砂石車，砂石重達 ${tons} 公噸，請問這等於多少公斤？`,
                o: [`${tons * 100}公斤`, `${kg}公斤`, `${tons * 10000}公斤`, `${tons / 1000}公斤`], a: 1
            });
            let ha = i;
            let m2 = ha * 10000;
            bank.push({
                id: id++, tag: "生活中的大單位", q: `大雄家的開心農場土地面積是 ${ha} 公頃，請問這塊土地是多少平方公尺？`,
                o: [`${ha * 100}平方公尺`, `${ha * 1000}平方公尺`, `${m2}平方公尺`, `${ha / 100}平方公尺`], a: 2
            });
        }

        // 確保精確達到並填滿至少 200 題
        while(bank.length < 200) {
            bank.push({
                id: id++, tag: "綜合複習", q: `一個底面為正方形的長方體，底面邊長 5 公分，高 10 公分，體積是多少立方公分？`,
                o: ["50立方公分", "100立方公分", "250立方公分", "125立方公分"], a: 2
            });
        }
        
        return bank.slice(0, 200);
    }

    const totalBank = generateTwoHundredQuestions();
    let currentQuiz = [];

    // 隨機抽 20 題並渲染畫面
    function renderNewQuiz() {
        // Fisher-Yates 洗牌演算法
        const shuffled = [...totalBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        
        // 取得前 20 題
        currentQuiz = shuffled.slice(0, 20);
        
        const poolContainer = document.getElementById('questions-pool');
        poolContainer.innerHTML = '';

        currentQuiz.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            let optionsHTML = '';
            item.o.forEach((optionText, optIdx) => {
                optionsHTML += `
                    <label class="option-item">
                        <input type="radio" name="question_${index}" value="${optIdx}">
                        ${["(1)", "(2)", "(3)", "(4)"][optIdx]} ${optionText}
                    </label>
                `;
            });

            card.innerHTML = `
                <span class="question-tag">${item.tag}</span>
                <div class="question-text">第 ${index + 1} 題：${item.q}</div>
                <div class="options-list">${optionsHTML}</div>
            `;
            poolContainer.appendChild(card);
        });
    }

    // 計算成績與讀卡回饋
    function gradeQuiz() {
        let score = 0;
        let unanswered = 0;

        currentQuiz.forEach((item, index) => {
            const selected = document.querySelector(`input[name="question_${index}"]:checked`);
            if (!selected) {
                unanswered++;
            } else if (parseInt(selected.value) === item.a) {
                score += 5;
            }
        });

        if (unanswered > 0) {
            if (!confirm(`你還有 ${unanswered} 題沒有寫喔！確定要現在交卷讀卡嗎？`)) {
                return;
            }
        }

        const resultPanel = document.getElementById('result-panel');
        resultPanel.style.display = 'block';
        
        if (score >= 60) {
            resultPanel.className = 'score-pass';
            resultPanel.innerHTML = `恭喜及格！你的得分是：${score} 分 <div class="feedback">觀念掌握得不錯，繼續保持！</div>`;
        } else {
            resultPanel.className = 'score-fail';
            resultPanel.innerHTML = `再接再厲！你的得分是：${score} 分 <div class="feedback">沒關係，再重新挑戰一次，多練習分數就會進步！</div>`;
        }

        // 修改按鈕功能，使其可以一鍵重新抽題
        const actionBtn = document.getElementById('action-btn');
        actionBtn.innerText = '挑戰下一套隨機20題';
        actionBtn.className = 'btn-reload';
        actionBtn.onclick = function() {
            resultPanel.style.display = 'none';
            window.scrollTo(0, 0);
            renderNewQuiz();
            actionBtn.innerText = '確認交卷讀卡';
            actionBtn.className = 'btn-submit';
            actionBtn.onclick = gradeQuiz;
        };

        window.scrollTo(0, document.body.scrollHeight);
    }

    // 網頁載入時立刻初始化考卷
    window.onload = renderNewQuiz;
</script>

</body>
</html>
