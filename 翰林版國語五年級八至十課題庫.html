<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五下國語翰林版 (8-10課) 20題隨機挑戰賽</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f5f7fa; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 1.1em; margin-bottom: 30px; }
        .info-bar { text-align: center; background: #fffbeb; border: 1px solid #fef3c7; color: #b45309; padding: 10px; border-radius: 8px; margin-bottom: 25px; font-weight: bold; }
        .question-card { margin-bottom: 25px; padding: 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; transition: 0.2s; }
        .question-card:hover { border-color: #cbd5e1; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .q-text { font-weight: bold; font-size: 1.05em; color: #1e293b; margin-bottom: 12px; }
        .options { display: flex; flex-direction: column; gap: 8px; }
        .option { display: flex; align-items: center; padding: 10px 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #f1f5f9; }
        .option input { margin-right: 10px; transform: scale(1.1); }
        .btn-submit { display: block; width: 220px; margin: 40px auto; background: #2ecc71; color: white; border: none; padding: 14px 28px; border-radius: 30px; font-size: 1.1em; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(46,204,113,0.2); transition: 0.3s; }
        .btn-submit:hover { background: #27ae60; transform: translateY(-2px); }
        .feedback { margin-top: 15px; display: none; padding: 15px; border-radius: 6px; font-weight: bold; }
        .correct { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .incorrect { background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .explanation { font-size: 0.95em; margin-top: 8px; padding-top: 8px; border-top: 1px dashed rgba(0,0,0,0.1); color: #475569; font-weight: normal; }
        .score-board { display: none; text-align: center; background: #ebf8ff; border: 2px solid #bee3f8; padding: 20px; border-radius: 10px; margin-bottom: 30px; font-size: 1.3em; font-weight: bold; color: #2b6cb0; }
        .btn-reload { background: #34495e; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-left: 10px; font-size: 0.8em; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h1>五下國語 (翰林版) 第 8-10 課 隨機測驗</h1>
    <div class="subtitle">單元範圍：第八課《懶人包大解密》、第九課《良言一句三冬暖》、第十課《擅長推理的人》</div>

    <div class="info-bar">
        🎯 系統已從 80 題核心題庫中隨機挑選 20 題。每次重新整理網頁，都會換新題目喔！
        <button class="btn-reload" onclick="window.location.reload()">重新抽題</button>
    </div>

    <div id="score-display" class="score-board"></div>

    <form id="quiz-form">
        <div id="questions-area"></div>
        <button type="button" class="btn-submit" onclick="submitQuiz()">提交答案並看解析</button>
    </form>
</div>

<script>
    // 原始 80 題完整題庫數據
    const allQuizData = [
        // ==== 第八課《懶人包大解密》 ====
        { q: "「懶人包」最主要的初衷和核心功能是什麼？", options: ["取代長篇大論的教科書", "幫助讀者在短時間內掌握複雜事件的輪廓", "提供免費的網路圖庫下載", "增加網頁的點閱率"], a: 1, exp: "課文指出懶人包是因應資訊爆炸，為了解決大眾時間有限、資訊繁雜的問題，將事件「去蕪存菁」後幫助讀者快速理解。" },
        { q: "下列關於「去蕪存菁」的字音字形，何者完全正確？", options: ["ㄑㄩˋ ㄨˊ ㄘㄨㄣˊ ㄑㄧㄥ，菁是指精華", "ㄑㄩˋ ㄨˇ ㄘㄨㄣˊ ㄐㄧㄥ，菁是指某種青草", "ㄑㄩ ㄨˊ ㄘㄨㄣˊ ㄐㄧㄥ，菁是指雜質", "ㄑㄩˋ ㄨˊ ㄘㄨㄣˊ ㄐㄧㄥ，菁是指事物最精粹的部分"], a: 3, exp: "去蕪存菁（ㄑㄩˋ ㄨˊ ㄘㄨㄣˊ ㄐㄧㄥ），意指除去雜質、保留精華。菁：精華、事物最精粹的部分。" },
        { q: "課文中提到懶人包就像是「別人嚼碎後餵給你的食物」，這句話隱含了什麼潛在風險？", options: ["食物不衛生，容易生病", "資訊可能已經被製作者主觀篩選或扭曲", "閱讀速度變慢，浪費時間", "懶人包的排版通常不美觀"], a: 1, exp: "「別人嚼碎的食物」意味著資訊已經過他人的二次加工與主觀重組，讀者容易失去獨立思考、全盤了解客觀事實的位置與機會。" },
        { q: "下列哪一個詞語，不適合用來形容網路時代「資訊量龐大且傳播極快」的現象？", options: ["資訊爆炸", "瞬息萬變", "鋪天蓋地", "風平浪靜"], a: 3, exp: "「風平浪靜」形容平靜無事，與網路資訊波濤洶湧、快速更迭的現象相反。" },
        { q: "製作懶人包時，通常會大量運用圖表或懶人圖，其主要目的是什麼？", options: ["隱藏文字中的錯誤", "增加檔案大小提高下載難度", "將複雜、枯燥的數據或時序「視覺化」", "證明製作者具有高超的繪圖技術"], a: 2, exp: "圖表與圖像能打破長篇大論的沉悶感，將抽象或複雜的數據、歷史時序轉化成一目了然的視覺資訊。" },
        { q: "下列哪一個「包」字的用法，其字義與「懶人包」的「包」最相近？", options: ["郵差送來的「包裹」", "這項工程我們「包」辦了", "醫生幫他「包」紮傷口", "這份資料是一個知識「組合包」"], a: 3, exp: "「懶人包」的包有「集結、組合、封裝」的意思；知識「組合包」最貼近其意。其餘分別為名詞物件、動詞負責、動詞圍裹。" },
        { q: "課文提醒我們在閱讀懶人包時要當個「聰明的讀者」，下列哪一種做法不符合課文的建議？", options: ["留意製作者是否隱藏了自己的立場", "主動搜尋其他不同觀點的報導進行比對", "只要是點閱率很高、轉發很多的懶人包，就可以百分之百相信", "思考懶人包中是否有刻意被省略的關鍵細節"], a: 2, exp: "點閱率高或轉發多不代表資訊絕對正確，可能只是迎合大眾口味或帶有情緒煽動，聰明的讀者仍需保持客觀懷疑。" },
        { q: "下列哪一組字形的辨析完全正確？", options: ["「篩」選／「師」傅：部首相同", "「博」物館／「搏」鬥：讀音相同，字形不同", "去「蕪」存菁／荒「蕪」：字義相同，皆指雜草、荒涼", "「扭」曲／「紐」約：字音相同，字形完全相同"], a: 2, exp: "「蕪」本義為雜草，引申為荒廢、繁雜。「去蕪」是除掉雜草（雜質），「荒蕪」是雜草叢生、土地荒廢，兩者皆與雜草相關。" },
        { q: "「這個懶人包只節錄了官員講錯的一句話，就斷定整個政策是失敗的。」上述行為最符合下列哪一個成語？", options: ["見仁見智", "斷章取義", "集思廣益", "推己及人"], a: 1, exp: "「斷章取義」指不顧全文、全貌，孤立地截取其中一段或一句來迎合自己的主觀偏見，正符合題目所描述的行為。" },
        { q: "下列文句中，哪一個成語的運用最恰當？", options: ["這本小說情節「去蕪存菁」，讓人看得一頭霧水", "網路上的假新聞「鋪天蓋地」而來，我們必須謹慎分辨", "他讀書總是「斷章取義」，所以能完整掌握整本書的精髓", "這篇文章寫得十分「瞬息萬變」，深受讀者喜愛"], a: 1, exp: "鋪天蓋地形容聲勢浩大、到處都是，形容網路假新聞滿天飛非常恰當。其餘成語皆與句意矛盾。" },
        { q: "「資訊爆炸的時代，我們每天接收的訊息何止成千上萬？」這句話運用了哪一種修辭手法？", options: ["擬人", "設問（激問）", "譬喻", "排比"], a: 1, exp: "「何止成千上萬？」答案就在問題的反面（意思是：當然遠遠超過成千上萬），這屬於設問修辭中的「激問（反問）」心理。" },
        { q: "下列哪一個字，其注音與「篩選」的「篩」相同？", options: ["帥", "師", "衰", "塞"], a: 1, exp: "篩的讀音為「ㄕㄞ」。而「師」讀ㄕ；「帥」讀ㄕㄨㄞˋ；「衰」讀ㄕㄨㄞ；「塞」讀ㄙㄞ。" },
        { q: "「懶人包雖然便利，（ ）會讓我們養成不願深入思考的習慣。」空格中填入哪一個詞最恰當？", options: ["因為", "所以", "卻也", "而且"], a: 2, exp: "前半句已有「雖然」，後半句承接轉折，填入「卻也keys」最流暢，能表達轉折且遞進的語氣。" },
        { q: "下列何者是「媒體識讀」的基本素養？", options: ["看到好笑的迷因圖就立刻轉傳給所有人", "學會辨識媒體訊息背後的動機、立場與真實性", "每天花八小時以上黏在網路上看新聞", "背誦所有新聞台的頻道號碼"], a: 1, exp: "媒體識讀（Media Literacy）是指大眾能批判性地解讀媒體訊息，不盲目接收，能看清其背後是否有偏見、主觀立場或廣告意圖。" },
        { q: "課文提到「任何事情都有許多面向」，這句話主要是想提醒讀者什麼？", options: ["世界很大，有許多國家", "拍照片要從正面和側面多拍幾張", "評價一個事件時，不要只看單一觀點，要多方考量", "懶人包必須做成正方形的多面體"], a: 2, exp: "一件事情往往有正有反、有因有果，只看單一面向（尤其只看懶人包）容易落入偏見，因此需要多角度客觀觀察。" },
        { q: "下列詞語中，哪一個「充」字的意思是指「填滿、塞滿」？", options: ["冒「充」好人", "「充」耳不聞", "補「充」說明", "精力「充」沛"], a: 3, exp: "「精力充沛」的充指飽滿、充滿；「充耳不聞」的充是塞住；「冒充」是頂替；「補充」是增加。" },
        { q: "在《懶人包大解密》一課中，作者對懶人包的整體態度可以用下列哪句話來概括？", options: ["百害而無一利，應全面禁止", "完美無缺，是人類智慧的結晶", "它是便利的工具，但使用時必須保持理性與思辨", "只有老人家才需要使用懶人包"], a: 2, exp: "作者並未全面否定懶人包，而是肯定其便利性，但更強調使用者「如何保持警覺、避免被誤導」的獨立思考能力。" },
        { q: "「我們不能只看到包裝精美的外表，卻忽略了其內容的（ ）。」空格中填入哪一個課本文句相關的詞語最對稱？", options: ["荒蕪", "空洞", "真實性", "點閱率"], a: 2, exp: "「包裝精美的外表」對應的應該是內容的「真實性」或「本質」，這正是媒體識讀要核心探討的部分。" },
        { q: "下列各組字音，哪一組完全相同？", options: ["「篩」選／「灑」水", "「博」學／搏「鬥」", "「省略」／「掠」奪", "「隱」瞞／「穩」當"], a: 1, exp: "「博」與「搏」皆讀 ㄅㄛˊ。篩（ㄕㄞ）／灑（ㄙㄚˇ）；略（ㄌㄩㄝˋ）／掠（ㄌㄩㄝˋ）；隱（ㄧㄣˇ）／穩（ㄨㄣˇ）。" },
        { q: "「盲目」一詞在課文中是指？", options: ["眼睛看不見", "沒有目標、失去理智地盲從", "在黑暗中摸索", "戴上眼罩"], a: 1, exp: "「盲目」在課文中是指缺乏認識、沒有主見，人云亦云地跟著別人相信或行動。" },
        { q: "要驗證一個懶人包的資訊是否正確，下列哪一個管道最不可靠？", options: ["政府官方澄清網站", "具公信力的第三方事實查核中心", "另一個不知道創作者是誰的匿名網路留言", "具有實名認證的學術論文與專家報告"], a: 2, exp: "匿名的網路留言缺乏來源根據，極可能是假訊息的溫床，最不可靠。" },
        { q: "下列哪一個字的部首是正確的？", options: ["「蕪」：無部", "「篩」：竹部", "「菁」：青部", "「扭」：丑部"], a: 1, exp: "「篩」是竹字頭，部首為「竹部」。「蕪」與「菁」皆為草部，「扭」為手部。" },
        { q: "「網路上流傳的訊息瞬息萬變，稍不注意就會落伍。」這句話中「稍」的意思是？", options: ["稍微、略微", "長出禾苗", "非常、極其", "停止"], a: 0, exp: "「稍不注意」指的是稍微不注意，表示程度很輕、時間很短。" },
        { q: "在《懶人包大解密》中，提到資訊被「濃縮」了. 下列哪一個詞跟「濃縮」是反義詞？", options: ["提煉", "精簡", "稀釋", "凝聚"], a: 2, exp: "濃縮是增加濃度、減少體積；稀釋是加入溶劑使濃度變低、體積變大，互為反義詞。" },
        { q: "「去蕪存菁」的「蕪」字，其本義指的是什麼？", options: ["肥沃的泥土", "叢生的雜草", "枯萎的樹枝", "美味的蔬菜"], a: 1, exp: "「蕪」的本義是田地因沒人管理而長滿雜草，因此常用來指繁雜、無用的雜質。" },
        { q: "下列哪一個字是左右結構的組合？", options: ["菁", "蕪", "扭", "篩"], a: 2, exp: "「扭」是由左邊的「扌」和右邊的「丑」組成，屬於左右結構。菁、蕪、篩皆為上下結構。" },
        { q: "「這個懶人包的圖表做得很直觀。」句中「直觀」的意思是？", options: ["直接用眼睛看，不需要思考", "不透過繁複的推理，就能直接感受、理解事物的本質", "直線前進的觀測方式", "直立起來觀看"], a: 1, exp: "在現代語境與圖表應用中，「直觀」代表清晰易懂，讓人不必經過痛苦的轉譯或推導就能一眼明白核心概念。" },

        // ==== 第九課《良言一句三冬暖》 ====
        { q: "俗諺「良言一句三冬暖，惡語傷人六月寒」中，利用「三冬暖」與「六月寒」的強烈對比，主要想傳達什麼道理？", options: ["夏天的天氣比冬天更令人難以忍受", "說話的態度與言語內容對人的影響極為深遠", "多說話可以調節身體的體溫", "冬天應該多讚美別人，夏天則不用"], a: 1, exp: "三冬（寒冬）因一句好話而感到溫暖，六月（酷暑）卻因一句惡言讓人心寒，極端對比凸顯出言語具有強大的力量。" },
        { q: "下列哪一個行為，最符合論說文中所強調的「同理心溝通」？", options: ["在同學考不好時說：『你看吧，誰叫你平常不讀書！』", "先聆聽對方的挫折與難過，並說：『我知道你很努力了，我們一起想辦法。』", "不管別人正在傷心，大聲炫耀自己拿了第一名", "當別人在說話時，不斷插嘴表達自己的意見"], a: 1, exp: "同理心是「站在對方的立場感受其情緒」，給予溫暖的心理支持與建設性的安慰。" },
        { q: "「反求諸己」這四個字，在人際溝通發生衝突時，代表什麼樣的智慧？", options: ["立刻跟對方翻臉", "指責都是別人的錯", "先冷靜下來，檢討自己是否有說錯話或態度不佳之處", "請求別人的原諒，但心裡很不服氣"], a: 2, exp: "「反求諸己」指遇到挫折或衝突時，先從自己身上尋找原因並加以修正，是高EQ溝通的表現。" },
        { q: "下列哪一組字音字形的配對，完全正確？", options: ["良言一「句」：ㄐㄩˋ，部首是口部", "「惡」語傷人：ㄜˇ，意思是很壞的語言", "「暖」和：ㄌㄨㄢˇ，代表溫熱", "六月「寒」：ㄏㄢˊ，部首是宀部，意思是很熱"], a: 0, exp: "「句」讀ㄐㄩˋ，口部。而「惡」語讀ㄜˋ；「暖」讀ㄋㄨˇ；「寒」代表寒冷、部首為宀部。" },
        { q: "「同樣一件事，用不同的語氣說出來，效果截然不同。」這句話中的「截然不同」可以用哪一個詞語替換？", options: ["大同小異", "天差地別", "半斤八兩", "不相上下"], a: 1, exp: "「截然不同」形容差距極大，與「天差地別」意思最為貼近。" },
        { q: "論說文通常由「論點」、「論據」、「論證」組成。在《良言一句三冬暖》中，『說話語氣會影響人際關係』是屬於哪一個部分？", options: ["論點（作者的主張）", "論據（支持主張的證據或故事）", "論證（論述的方法）", "結論的錯別字"], a: 0, exp: "「論點」是作者在文章中所表達的核心見解、主張或觀點。" },
        { q: "小明不小心把小華的彩色筆弄斷了，小華非常生氣。下列哪一種回應方式屬於「惡語」，會讓衝突擴大？", options: ["『對不起，我真的不是故意的，我買一支新的還你。』", "『斷了就斷了，你叫什麼叫？小氣鬼！』", "『真的很抱歉，我現在陪你去跟老師報告。』", "默默低下頭，誠懇地向小華鞠躬道歉"], a: 1, exp: "嗆聲並辱罵對方「小氣鬼」，屬於帶有攻擊性、標籤化的「惡語」，必然會激化衝突。" },
        { q: "「江山易改，本性難移。」這句話常用來形容人的性格很難改變。但在溝通中，我們應該相信什麼？", options: ["反正大家都改不了，乾脆不要溝通", "只要透過覺察與練習，我們可以改變說話的習慣，讓語氣變溫和", "只要用拳頭解決，對方的本性就會改變", "說話難聽是天生的，不需要感到愧疚"], a: 1, exp: "本課旨在引導學生透過自我反省與練習，主動調整說話語氣與態度，從而改善人際關係。" },
        { q: "下列哪一個「惡」字的讀音，與「惡語傷人」的「惡」相同？", options: ["可「惡」", "厭「惡」", "善「惡」", "「惡」心（想吐）"], a: 2, exp: "「惡語」的惡讀「ㄜˋ」，指壞的、不善的。「善惡」的惡亦讀「ㄜˋ」。可惡、厭惡讀「ㄨˋ」。" },
        { q: "「說話時如果總是帶著尖銳的譏諷，就像在別人的心上釘釘子，拔出來也會留下傷痕。」這句話主要運用了哪一種修辭？", options: ["排比", "譬喻", "誇張", "借代"], a: 1, exp: "將「尖銳的譏諷」比作「在心上釘釘子」，用具體有形的傷害來描繪抽象的言語傷害，屬於譬喻修辭。" },
        { q: "「阿姨在菜市場擺攤，總是（ ）地招呼客人，所以生意特別好。」空格中填入哪一個詞語最恰當？", options: ["冷嘲熱諷", "和顏悅色", "怒氣沖沖", "虛張聲勢"], a: 1, exp: "「和顏悅色」形容和藹可親、面帶笑容的容貌，非常適合用來形容做生意時熱情親切的招呼態度。" },
        { q: "下列詞語中的「諸」，哪一個的意思是「之於」的合音字（相當於「向……」或「在……」）？", options: ["反求「諸」己", "「諸」位同學", "「諸」事大吉", "「諸」侯"], a: 0, exp: "「反求諸己」的「諸」是「之於」的合音。「反求諸己」即「反求之於己」（從自己身上尋找原因）。其餘選項的「諸」字皆為「眾多、各個」之意。" },
        { q: "當你發現朋友因為考試考砸而躲在座位上哭泣，下列哪一句話最能展現「三冬暖」的力量？", options: ["『哎呀，我就說那一題會考，你怎麼偏不聽？』", "『別哭了，再哭就要變成大熊貓了啦！』", "『這次題目真的很刁鑽，我也錯好幾題。等你想聊聊時，我都在這裡。』", "『你哭也沒用啊，分數又不會變回來。』"], a: 2, exp: "給予對方情感上的認同（題目很刁鑽、我也錯了）與不具壓力的陪伴承諾，是最溫暖且具修復力的良言。" },
        { q: "「良言一句三冬暖」這課課文中，各類生活實例主要用來作為文章的什麼？", options: ["論點", "論據", "論證", "前言"], a: 1, exp: "故事、實例、名言佳句在論說文中，都是用來支撐論點的「論據」（證據）。" },
        { q: "下列哪一個字形完全正確？", options: ["「既」然如此", "「即」然如此", "「計」然如此", "「急」然如此"], a: 0, exp: "正確字形為「既然如此」，表示事情已經到了這種地步。" },
        { q: "下列哪一個「暖」字的用法是錯誤的？", options: ["溫「暖」", "「暖」和", "「暖」身操", "「暖」國語"], a: 3, exp: "沒有「暖國語」這種用法，其餘皆與溫度、熱身相關。" },
        { q: "「口出惡言」的「口」在句中當作動詞用，意思是「說出」。下列哪一個文句中的「手」字，也當作動詞使用？", options: ["他是我的左右「手」", "請把這封信「手」交給他", "這本書由他親「手」寫成", "兩隊「手」拉手一起進場"], a: 1, exp: "「手交」意指親自遞交，此處「手」有動詞化的語境。" },
        { q: "「譏諷」一詞的意思為何？", options: ["好心勸導", "用尖刻的話嘲笑、諷刺別人", "大聲稱讚", "默默不說話"], a: 1, exp: "譏諷是指用含蓄或尖銳的言語去嘲弄、挖苦他人的缺點或失敗。" },
        { q: "下列何者不屬於「良好溝通」的三要素？", options: ["誠懇的態度", "適當的語氣", "堅持自己的意見絕不讓步", "設身處地為對方著想"], a: 2, exp: "溝通是雙向的，一味堅持自己絕不讓步會形成僵局，不屬於良好溝通。" },
        { q: "「一句無心的批評，可能會（ ）他人的自信心。」空格中填入哪一個詞語最恰當？", options: ["建立", "瓦解", "充實", "美化"], a: 1, exp: "批評帶來的是負面影響，「瓦解」有崩潰、消滅的意思，最符合句意。" },
        { q: "下列哪一個詞語的意思是「言語誠懇，情意真摯」？", options: ["巧言令色", "花言巧語", "言詞懇切", "口是心非"], a: 2, exp: "言詞懇切形容說話態度非常誠懇真摯。其餘皆帶有虛偽或虛假的意思。" },
        { q: "「說話是一門藝術。」這句話屬於什麼句型？", options: ["敘事句", "有無句", "判斷句", "描寫句"], a: 2, exp: "含有「是」字，用來斷定人、事、物性質或關係的句子，屬於「判斷句」。" },
        { q: "下列哪一個成語用來形容「說話非常有條理，理由非常充足」？", options: ["理直氣壯", "振振有詞", "據理力爭", "頭頭是道"], a: 3, exp: "「頭頭是道」形容說話很有條理與道理。振振有詞、理直氣壯有時帶有強辯或氣勢凌人的貶義。" },
        { q: "「我們在指責別人的時候，往往忘記了自己也曾犯過同樣的錯誤。」這句話勸人要怎樣？", options: ["得寸進尺", "嚴以律己，寬以待人", "推卸責任", "幸災樂禍"], a: 1, exp: "這句話是在提醒大家要多自我反省，對別人要多包容，即嚴以律己，寬以待人。" },
        { q: "下列哪一個字不是「宀」（寶蓋頭）部首？", options: ["寒", "容", "察", "蕪"], a: 3, exp: "「蕪」是草部（艹），其餘寒、容、察皆為宀部。" },
        { q: "「聽了老師的一番鼓勵，他心中（ ）起一絲希望。」空格中填入哪一個字最恰當？", options: ["燃", "染", "懶", "難"], a: 0, exp: "「燃起」希望，用火光點燃來譬喻希望的產生。" },
        { q: "在《良言一句三冬暖》課文中，作者認為「良好的溝通」能帶來什麼最終結果？", options: ["賺到很多錢", "讓人際關係更和諧、溫暖", "讓別人都聽你的話", "打敗所有的對手"], a: 1, exp: "溝通的終極目標是促進理解、消弭衝突，營造和諧溫暖的人際互動氛圍。" },

        // ==== 第十課《擅長推理的人》 ====
        { q: "推理小說中的神探「福爾摩斯」，其最令人佩服的核心能力是什麼？", options: ["過人的武功與體力", "敏銳的觀察力與嚴密的邏輯推理", "擁有許多高科技的武器", "每次猜測運氣都很好"], a: 1, exp: "福爾摩斯之所以能破案，靠的是對微小細節的「細心觀察」和科學的「因果推理」。" },
        { q: "「抽絲剝繭」這個成語在課文中用來形容什麼樣的思考過程？", options: ["做事情非常慢條斯理", "製作蠶絲被的複雜手工", "由淺入深，逐步分析、探尋事情的真相", "把事情搞得越來越複雜"], a: 2, exp: "抽絲剝繭比喻根據線索，一步步深入、有條理地分析，直到找出事情的真相。" },
        { q: "課文中提到，要成為一個「擅長推理的人」，必須先具備哪一種習慣？", options: ["不放過生活中的任何小細節", "經常看電視新聞", "隨身攜帶放大鏡", "不相信任何人說的話"], a: 0, exp: "推理建立在客觀證據上，而證據往往藏在一般人容易忽略的「生活小細節」中。" },
        { q: "下列哪一組字音字形的辨析完全正確？", options: ["「察」言觀色：ㄔㄚˊ，部首是宀部", "抽絲剝「繭」：ㄐㄧㄢˇ，部首是虫部", "線「索」：慢速的讀音", "邏「輯」：讀音是ㄐㄧˊ，部首是車部"], a: 0, exp: "「察」讀ㄔㄚˊ，宀部。剝「繭」是艸部（下面是虫）；線「索」讀ㄙㄨㄛˇ；邏「輯」是車部（讀ㄐㄧˊ）。" },
        { q: "「他的眼神閃爍，說話吞吞吐吐，顯然刻意在（ ）什麼。」空格中最適合填入哪一個詞？", options: ["展現", "隱瞞", "推理", "溝通"], a: 1, exp: "眼神閃爍、言語吞吐是心虛、不想讓別人知道真相的表現，故選「隱瞞」。" },
        { q: "下列哪一個詞語的意思是「一點痕跡或徵兆也沒有留下來」，形容做事極為周密？", options: ["蛛絲馬跡", "不露痕跡", "順藤摸瓜", "大張旗鼓"], a: 1, exp: "「不露痕跡」形容事情做得非常乾淨、隱蔽，沒有留下任何可以追查的線索。" },
        { q: "「福爾摩斯看到華生鞋子上有特定地區的泥土，就推斷他去過那裡。」這在推理中屬於哪一個步驟？", options: ["提出沒有根據的猜想", "從觀察到的「線索」導向「事實真相」", "故意栽贓別人", "隨口胡說"], a: 1, exp: "「泥土」是觀察到的客觀線索，透過地理位置的關聯進行邏輯推導，這就是標準的推理過程。" },
        { q: "下列文句中，哪一個成語的運用最恰當？", options: ["經過警方「抽絲剝繭」的調查，這件懸案終於真相大白", "他做事總是「不露痕跡」，讓大家都稱讚他很會做宣傳", "只要我們「察言觀色」，就能在黑暗中看清楚東西", "這張地圖畫得非常「蛛絲馬跡」，真好用"], a: 0, exp: "抽絲剝繭用來形容警方辦案、調查懸案的過程，非常貼切流暢。其餘皆誤用。" },
        { q: "「蛛絲馬跡」中的「馬跡」，在古代本義指的是什麼？", options: ["馬跑過留下的蹄印", "灶馬（一種昆蟲）爬過留下的痕跡", "馬車走過的車輪痕", "馬拉松比賽的路線"], a: 1, exp: "蛛絲指蜘蛛網的殘絲，馬跡指「灶馬」（一種常在廚房煙囪活動的小昆蟲）爬過的痕跡，皆用來比喻極其微小、隱約可尋的線索。" },
        { q: "下列哪一個字，其注音與「輯」相同？（例如：邏輯）", options: ["集", "期", "即", "級"], a: 0, exp: "邏「輯」讀ㄐㄧˊ；「集」讀ㄐㄧˊ。其餘：期 ㄑㄧˊ、即 ㄐㄧˊ、級 ㄐㄧˊ。" },
        { q: "「邏輯」一詞的意思是？", options: ["一種高超的武術", "思維的規律、因果推導的嚴密性", "蒐集古董的嗜好", "一種進口的偵探放大鏡"], a: 1, exp: "邏輯（Logic）是指思維的規律、客觀的因果關係，是推理的核心工具。" },
        { q: "下列哪一個句子的修辭是「擬人」？", options: ["細微的線索在角落裡悄悄對著偵探眨眼睛", "推理就像是一場與嫌犯的心智捉迷藏", "他高興得一蹦三尺高", "難道我們不應該細心觀察嗎？"], a: 0, exp: "讓無生物的「線索」做出人類「悄悄眨眼睛」的動作，屬於擬人修辭。" },
        { q: "「邊際效益」只要肯留心，（ ）最不起眼的地方，（ ）藏著破案的關鍵。」空格中應填入哪一組關連詞？", options: ["因為……所以……", "即使……也……", "雖然……但是……", "不僅……還……"], a: 1, exp: "「即使……也……」屬於假設複句中的讓步關係，最能凸顯「地點再怎麼不起眼，依然會有關鍵」的語氣。" },
        { q: "在《擅長推理的人》中，作者想要傳達給讀者的核心觀念是什麼？", options: ["大家都應該去報考警察大學", "推理是天才的專利，一般人學物理", "在日常生活中培養觀察力與邏輯思考，人人都能提升思辨能力", "多看推理小說就可以不用寫作業"], a: 2, exp: "本課並非要人處理專業偵探，而是強調將「觀察」與「邏輯」融入生活，培養思辨與解決問題的能力。" },
        { q: "下列哪一個「剝」字的讀音，與「抽絲剝繭」的「剝」相同？", options: ["「剝」削", "「剝」花生", "生吞活「剝」", "「剝」落"], a: 1, exp: "抽絲剝繭的剝讀「ㄅㄠ」（口語音，指剝殼、去皮）；「剝花生」亦讀「ㄅㄠ」。剝削、剝落、生吞活剝讀「ㄅㄛ」。" },
        { q: "「察言觀色」的意思是？", options: ["觀察別人的語言和臉色，以揣摩其心思 or 心境", "檢查考卷上的錯字和顏色", "看魔術表演時注意手法", "調配顏料的過程"], a: 0, exp: "察言觀色指透過注意一個人的言語、說話神態及臉色變化，來推測他內心的真實想法。" },
        { q: "當你回到家，發現玄關放了一把濕淋淋的雨傘，而天空中正陽光普照。你可以推論出什麼？", options: ["雨傘自己會走路", "剛剛外面的某個地方一定下過雨，或者有人剛從有雨的地方回來", "家裡一定遭小偷了", "今天一整天絕對沒有下雨"], a: 1, exp: "濕雨傘代表有人用過它防雨，雖然現在出太陽，但可合理推論出「不久前或某處有下雨」的因果鏈。" },
        { q: "下列哪一個詞語不是用來形容「觀察或思考不夠周全」？", options: ["走馬看花", "粗心大意", "洞察先機", "丟三落四"], a: 2, exp: "「洞察先機」形容目光敏銳，能提早看清事情的發展，屬於褒義詞。其餘皆指草率或不細心。" },
        { q: "「這個謎題太難了，我簡集是（ ）。」空格中填入哪一個成語最能表達毫無頭緒的感覺？", options: ["胸有成竹", "百思不解", "一目了然", "迎刃而解"], a: 1, exp: "「百思不解」形容反覆思考依然無法理解、想不透。正符合題目「太難、毫無頭緒」的語境。" },
        { q: "下列哪一個字形是正確的？", options: ["編「輯」", "編「緝」", "編「織」", "編「及」"], a: 0, exp: "負責整理、修訂書刊或資料的人稱為「編輯」，正確字形為「輯」。" },
        { q: "「福爾摩斯將各種零碎的線索拼湊起來，讓真相（ ）。」空格中填入哪一個成語最恰當？", options: ["不為人知", "水落石出", "捕風捉影", "撲朔迷離"], a: 1, exp: "「水落石出」比喻事情真相大白。線索拼湊完整後，真相自然就清晰顯現了。" },
        { q: "下列何者是「因果關係」的正確邏輯推論？", options: ["因為他今天穿紅色的衣服，所以他國語一定考一百分", "開燈因為昨晚熬夜太晚睡，所以他今天上課一直打呵欠", "因為他長得很高，所以他非常喜歡吃蘋果", "因為他忘記帶課本，所以今天天氣一定會下雨"], a: 1, exp: "熬夜（因）會導致精神不濟、打呵欠（果），這在生理與邏輯上具有合理的因果連結。" },
        { q: "「這座古墓裡留下了許多讓考古學家興奮不已的（ ）。」空格中填入哪一個詞最恰當？", options: ["零食", "蛛絲馬跡", "缺點", "腳踏車"], a: 1, exp: "「蛛絲馬跡」在此形容古墓中留下來的隱約線索、歷史痕跡，最適合考古研究。" },
        { q: "下列哪一個字，其部首是正確的？", options: ["「索」：糸部", "「輯」：口部", "「繭」：虫部", "「偵」：卜部"], a: 0, exp: "「索」的部首是「糸」部。「輯」是車部；「繭」是艸部；「偵」是人部。" },
        { q: "「他做這件事的目的，大家都心知肚明，只是不願意說破而已。」句中「心知肚明」的意思是？", options: ["肚子裡裝了很多書", "心裡非常明白", "心地很善良", "心臟與肚子很健康"], a: 1, exp: "「心知肚明」形容彼此心裡其實都非常清楚、明白，不需要明說。" },
        { q: "「凡走過必留下痕跡。」這句話在推理破案中強調的是什麼？", options: ["走路時一定要穿鞋子", "只要有行為發生，就一定會留下客觀的線索與證據", "每個人都應該多去外面散步", "小偷走路的速度都快捷"], a: 1, exp: "這是科學破案與推理的核心基礎：任何行為、事件，都會在物理或環境上留下可供追查的客觀證據。" }
    ];

    // --- 核心邏輯：隨機洗牌並抽取 20 題 ---
    function getRandomQuiz(arr, count) {
        // 複製一份陣列避免干擾原始數據
        let shuffled = [...arr];
        // Fisher-Yates 洗牌算法
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        // 回傳前 20 題
        return shuffled.slice(0, count);
    }

    // 抽取 20 題作為本次測驗題目
    const quizData = getRandomQuiz(allQuizData, 20);

    // 動態渲染題目到網頁上
    const area = document.getElementById('questions-area');
    quizData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `
            <div class="q-text">Q${index + 1}. ${item.q}</div>
            <div class="options">
                ${item.options.map((opt, i) => `
                    <label class="option">
                        <input type="radio" name="q${index}" value="${i}">
                        <span>${opt}</span>
                    </label>
                `).join('')}
            </div>
            <div id="feed-${index}" class="feedback"></div>
        `;
        area.appendChild(card);
    });

    // 提交卷面並批改邏輯
    function submitQuiz() {
        let score = 0;
        let total = quizData.length; // 固定為 20 題
        
        quizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const feed = document.getElementById(`feed-${index}`);
            feed.style.display = 'block';

            if (selected && parseInt(selected.value) === item.a) {
                score++;
                feed.className = 'feedback correct';
                feed.innerHTML = `<span>○ 正確！</span><div class="explanation"><strong>解析：</strong>${item.exp}</div>`;
            } else {
                feed.className = 'feedback incorrect';
                feed.innerHTML = `<span>× 錯誤。正確答案是【${item.options[item.a]}】</span><div class="explanation"><strong>解析：</strong>${item.exp}</div>`;
            }
        });

        // 顯示總成績
        const scoreDiv = document.getElementById('score-display');
        scoreDiv.style.display = 'block';
        scoreDiv.innerText = `測驗結束！您的本次得分：${score} / ${total} 題 （正確率：${Math.round(score/total*100)}%）`;
        
        // 頁面平滑捲動回頂端看成績
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
